<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unimares Tracker — Gestión Mercaderistas</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  body { margin: 0; background: #F0F4FF; }
  select, input, textarea { appearance: none; -webkit-appearance: none; font-family: inherit; }
</style>
<script>
// Catch Babel compilation errors
document.addEventListener("DOMContentLoaded", function() {
  setTimeout(function() {
    if (document.getElementById("root").innerHTML === "") {
      document.getElementById("root").innerHTML = 
        "<div style='padding:20px;font-family:monospace;color:red'>" +
        "<h3>Error: La app no cargo. Posible error de Babel.</h3>" +
        "<p>Revisa la consola del navegador (F12) para mas detalles.</p>" +
        "</div>";
    }
  }, 3000);
});
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useCallback } = React;

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwETa6FN3QEWocrTRxVU34puuzgfTLu4kPfeExlfAPQwKfhqzpIc8t-vES8vfIvWHLR9Q/exec";


// ── USUARIOS Y ACCESO ──────────────────────────────────────────────────────
const USUARIOS = [
  {pin:"1001", nombre:"Ruby Gracia",     rol:"mercaderista"},
  {pin:"1002", nombre:"Mercadeo 1",      rol:"mercaderista"},
  {pin:"1003", nombre:"Mercadeo 2",      rol:"mercaderista"},
  {pin:"4313", nombre:"Supervisor / Jefe", rol:"supervisor"},
];

function Login({onLogin}) {
  const [pin, setPin] = React.useState("");
  const [error, setError] = React.useState(false);
  const [shake, setShake] = React.useState(false);

  const tryPin = (p) => {
    const user = USUARIOS.find(u => u.pin === p);
    if (user) {
      onLogin(user);
    } else {
      setShake(true);
      setError(true);
      setTimeout(() => { setShake(false); setError(false); setPin(""); }, 900);
    }
  };

  const press = (val) => {
    if (val === "DEL") { setPin(p => p.slice(0,-1)); return; }
    const next = pin + val;
    setPin(next);
    if (next.length === 4) setTimeout(() => tryPin(next), 150);
  };

  const KEYS = ["1","2","3","4","5","6","7","8","9","","0","DEL"];

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0F2167,#1a3a8f,#0F2167)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      {/* Logo */}
      <img src="https://lobomarketer-byte.github.io/unimares-tracker/logo10.png"
        alt="Unimares" style={{height:"60px",objectFit:"contain",marginBottom:"8px"}}/>
      <p style={{color:"rgba(255,255,255,0.6)",fontSize:"12px",marginBottom:"36px",fontWeight:"600",letterSpacing:"0.05em"}}>GESTIÓN DE MERCADERISTAS</p>

      {/* PIN dots */}
      <div style={{
        display:"flex", gap:"16px", marginBottom:"32px",
        transform: shake ? "translateX(0)" : "none",
        animation: shake ? "shake 0.4s ease" : "none"
      }}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{
            width:"16px", height:"16px", borderRadius:"50%",
            background: pin.length > i ? (error?"#EF4444":"#38BDF8") : "rgba(255,255,255,0.2)",
            border: "2px solid " + (pin.length > i ? (error?"#EF4444":"#38BDF8") : "rgba(255,255,255,0.3)"),
            transition:"all 0.15s"
          }}/>
        ))}
      </div>

      {error && <p style={{color:"#FCA5A5",fontSize:"13px",fontWeight:"700",marginBottom:"16px",marginTop:"-16px"}}>PIN incorrecto</p>}

      {/* Teclado */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,72px)",gap:"12px"}}>
        {KEYS.map((k,i) => (
          k === "" ? <div key={i}/> :
          <button key={i} onClick={() => press(k)}
            style={{
              width:"72px", height:"72px", borderRadius:"50%",
              background: k==="DEL" ? "rgba(255,255,255,0.08)" : "rgba(255,255,255,0.12)",
              border: "1px solid rgba(255,255,255,0.15)",
              color:"white", fontSize: k==="DEL"?"18px":"24px",
              fontWeight:"700", cursor:"pointer", fontFamily:"inherit",
              transition:"all 0.1s", backdropFilter:"blur(4px)"
            }}>
            {k==="DEL" ? "⌫" : k}
          </button>
        ))}
      </div>

      <style>{`@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 60%{transform:translateX(8px)} }`}</style>
    </div>
  );
}

const ALMACENES = ["Éxito Ibagué Centro","Éxito Ibagué Norte","Jumbo Ibagué","Carulla La Estación","Mercacentro No. 10","Olímpica Ibagué","Populares","Surtiplaza La 37","Surtiplaza Acqua","Surtiplaza El Salado"];
const MERCS = [{id:1,nombre:"Ruby Gracia",almacen:"Todos",rol:"Mercaderista"},{id:2,nombre:"Mercadeo 1",almacen:"",rol:"Mercaderista"},{id:3,nombre:"Mercadeo 2",almacen:"",rol:"Mercaderista"},{id:4,nombre:"Supervisor / Jefe",almacen:"Todos",rol:"Supervisor"}];
const PRODS = ["Camarón Jumbo x 350g (Cód.24)","Camarón Hogar x 350g (Cód.22)","Filete de Salmón Porción x 350g (Cód.8)","Mixtura Mariscos x 500g (Cód.11)","Filete de Tilapia x 500g (Cód.21)","Filete de Tilapia x 1000g (Cód.30)","Bagre Amazonas x 450g (Cód.28)","Pescado Seco (Cód.188)"];
const COMP = ["Rico Mar","Cinco Sierras","Vitamar","Antillana","Ancla y Viento","Marca Blanca"];
const HOY = () => new Date().toISOString().split("T")[0];
const HORA = () => new Date().toTimeString().slice(0,5);
const TIMESTAMP = () => {
  const now = new Date();
  // Colombia is UTC-5
  const col = new Date(now.getTime() - 5*60*60*1000);
  const d = col.toISOString();
  const fecha = d.slice(8,10)+"/"+d.slice(5,7)+"/"+d.slice(0,4);
  let h = col.getUTCHours();
  const m = String(col.getUTCMinutes()).padStart(2,"0");
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return fecha+" "+String(h).padStart(2,"0")+":"+m+" "+ampm;
};

// ── ENVIAR A GOOGLE SHEETS ─────────────────────────────────────────────────
async function enviarASheets(modulo, campos) {
  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ modulo, campos })
    });
    return true;
  } catch(e) {
    console.error("Error enviando a Sheets:", e);
    return false;
  }
}

// ── COMPONENTES BASE ───────────────────────────────────────────────────────
function Field({label, type="text", value, onChange, options, rows=3}) {
  const css = {background:"#F0F4FF",border:"none",borderRadius:"12px",padding:"10px 14px",fontSize:"14px",width:"100%",outline:"none",color:"#1a2240",fontFamily:"inherit"};
  return (
    <div style={{marginBottom:"12px"}}>
      {label && <label style={{fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.06em",color:"#3B6FE8",display:"block",marginBottom:"4px"}}>{label}</label>}
      {type==="select"
        ? <select value={value} onChange={onChange} style={css}>
            <option value="">— Seleccionar —</option>
            {options.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
        : type==="textarea"
        ? <textarea value={value} onChange={onChange} rows={rows} style={css}/>
        : <input type={type} value={value} onChange={onChange} style={css}/>
      }
    </div>
  );
}

function Tag({color, children}) {
  const c = {
    green:{background:"#DCFCE7",color:"#166534"},red:{background:"#FEE2E2",color:"#991B1B"},
    blue:{background:"#DBEAFE",color:"#1E40AF"},orange:{background:"#FFEDD5",color:"#9A3412"},
    yellow:{background:"#FEF9C3",color:"#854D0E"},teal:{background:"#CCFBF1",color:"#0F766E"},
    gray:{background:"#F1F5F9",color:"#475569"},
  };
  const s = c[color]||c.gray;
  return <span style={{...s,fontSize:"11px",fontWeight:"700",padding:"3px 10px",borderRadius:"9999px",whiteSpace:"nowrap"}}>{children}</span>;
}

function Btn({onClick, gradient, shadow, children, loading}) {
  return (
    <button onClick={onClick} disabled={loading}
      style={{width:"100%",fontWeight:"700",padding:"14px",borderRadius:"12px",fontSize:"14px",border:"none",cursor:loading?"not-allowed":"pointer",background:loading?"#CBD5E1":gradient,color:"white",boxShadow:loading?"none":shadow,transition:"all 0.15s",fontFamily:"inherit",opacity:loading?0.7:1}}
      onMouseDown={e=>!loading&&(e.currentTarget.style.transform="scale(0.97)")}
      onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}
      onTouchStart={e=>!loading&&(e.currentTarget.style.transform="scale(0.97)")}
      onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}
    >
      {loading ? "⏳ Guardando en Sheets..." : children}
    </button>
  );
}

function Card({children, style={}}) {
  return <div style={{background:"white",borderRadius:"16px",padding:"16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:"1px solid #E8EDF8",marginBottom:"12px",...style}}>{children}</div>;
}

function SectionHead({gradient, title, sub}) {
  return (
    <div style={{background:gradient,borderRadius:"24px",padding:"20px",marginBottom:"16px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:"-30px",right:"-30px",width:"120px",height:"120px",background:"rgba(255,255,255,0.07)",borderRadius:"50%"}}/>
      <h2 style={{color:"white",fontWeight:"900",fontSize:"22px",margin:"0 0 4px 0",position:"relative",zIndex:1}}>{title}</h2>
      <p style={{color:"rgba(255,255,255,0.7)",fontSize:"12px",margin:0,position:"relative",zIndex:1}}>{sub}</p>
    </div>
  );
}

function Checkbox({checked, onChange, label, activeColor="#16A34A", activeBg="#DCFCE7", activeBorder="#16A34A"}) {
  return (
    <div onClick={()=>onChange(!checked)} style={{display:"flex",alignItems:"center",gap:"12px",borderRadius:"12px",padding:"12px",marginBottom:"12px",cursor:"pointer",background:checked?activeBg:"#F0F4FF",border:`2px solid ${checked?activeBorder:"transparent"}`,transition:"all 0.15s"}}>
      <div style={{width:"20px",height:"20px",borderRadius:"6px",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:checked?activeColor:"white",border:checked?"none":"2px solid #CBD5E1",transition:"all 0.15s"}}>
        {checked && <span style={{color:"white",fontSize:"11px",fontWeight:"900"}}>✓</span>}
      </div>
      <span style={{fontSize:"14px",fontWeight:"600",color:checked?"#166534":"#475569"}}>{label}</span>
    </div>
  );
}

function Toast({msg, ok}) {
  if (!msg) return null;
  return (
    <div style={{position:"fixed",top:"16px",left:"50%",transform:"translateX(-50%)",background:ok?"#166534":"#991B1B",color:"white",padding:"10px 20px",borderRadius:"12px",fontSize:"13px",fontWeight:"700",zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,0.2)",whiteSpace:"nowrap"}}>
      {ok?"✅":"❌"} {msg}
    </div>
  );
}

function StatCard({icon, value, label, gradient}) {
  return (
    <div style={{background:gradient,borderRadius:"16px",padding:"14px",color:"white"}}>
      <div style={{fontSize:"24px",marginBottom:"4px"}}>{icon}</div>
      <div style={{fontSize:"32px",fontWeight:"900",lineHeight:1}}>{value}</div>
      <div style={{fontSize:"11px",fontWeight:"600",opacity:0.85,marginTop:"4px",lineHeight:"1.3"}}>{label}</div>
    </div>
  );
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function BarChart({data, color}) {
  const max = Math.max(...data.map(d=>d.v), 1);
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:"6px",height:"70px",padding:"0 4px"}}>
      {data.map((d,i) => (
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}>
          <span style={{fontSize:"10px",fontWeight:"900",color:"#0F2167"}}>{d.v||""}</span>
          <div style={{width:"100%",background:d.v>0?color:"#E8EDF8",borderRadius:"6px 6px 0 0",height: d.v>0 ? Math.max((d.v/max)*50,6)+"px":"6px",transition:"height 0.4s ease",minHeight:"6px"}}/>
          <span style={{fontSize:"9px",color:"#94A3B8",fontWeight:"600",textAlign:"center",lineHeight:"1.1"}}>{d.l}</span>
        </div>
      ))}
    </div>
  );
}

function MiniDonut({pct, color, label, value}) {
  const r = 28, stroke = 7;
  const circ = 2*Math.PI*r;
  const offset = circ - (pct/100)*circ;
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"4px"}}>
      <svg width="70" height="70" viewBox="0 0 70 70">
        <circle cx="35" cy="35" r={r} fill="none" stroke="#E8EDF8" strokeWidth={stroke}/>
        <circle cx="35" cy="35" r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset}
          strokeLinecap="round" transform="rotate(-90 35 35)"
          style={{transition:"stroke-dashoffset 0.6s ease"}}/>
        <text x="35" y="39" textAnchor="middle" fontSize="14" fontWeight="900" fill="#0F2167">{value}</text>
      </svg>
      <span style={{fontSize:"10px",color:"#6B7B9E",fontWeight:"700",textAlign:"center"}}>{label}</span>
    </div>
  );
}

function Dashboard({as, ac, pr, inv, av, limpiar}) {
  const h = HOY();
  const alertas = inv.filter(r => r.stockMin && Number(r.stock) <= Number(r.stockMin));

  // Datos gráfica actividades por día (últimos 7 días)
  const ultimos7 = Array.from({length:7}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()-6+i);
    const key = d.toISOString().split("T")[0];
    const dias = ["Do","Lu","Ma","Mi","Ju","Vi","Sa"];
    return { l: dias[d.getDay()], v: ac.filter(r=>r.fecha===key).length, key };
  });

  // Datos gráfica productos en chequeo
  const prodChequeo = PRODS.slice(0,6).map(p => ({
    l: p.split(" ")[0],
    v: pr.filter(r=>r.prod===p).length
  }));

  // Métricas hoy
  const presHoy = as.filter(r=>r.fecha===h).length;
  const actHoy  = ac.filter(r=>r.fecha===h).length;
  const invHoy  = inv.filter(r=>r.fecha===h).length;
  const precHoy = pr.filter(r=>r.fecha===h).length;
  const totalMercs = MERCS.filter(m=>m.rol==="Mercaderista").length;
  const pctPres = totalMercs > 0 ? Math.round((presHoy/totalMercs)*100) : 0;
  const pctAct  = Math.min(Math.round((actHoy/Math.max(presHoy*3,1))*100),100);

  return (
    <div>
      {/* Hero */}
      <div style={{background:"linear-gradient(135deg,#0F2167,#1a3a8f,#0f4c8f)",borderRadius:"24px",padding:"20px",marginBottom:"16px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:"-32px",right:"-32px",width:"128px",height:"128px",background:"rgba(255,255,255,0.06)",borderRadius:"50%"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",position:"relative",zIndex:1}}>
          <div>
            <img src="https://lobomarketer-byte.github.io/unimares-tracker/logo10.png" alt="Unimares" style={{height:"44px",objectFit:"contain",maxWidth:"180px",marginBottom:"4px"}}/>
            <p style={{color:"#93C5FD",fontSize:"12px",margin:"0 0 2px 0",fontWeight:"500"}}>Gestión Mercaderistas · Ibagué</p>
            <p style={{color:"#60A5FA",fontSize:"11px",margin:0}}>{new Date().toLocaleDateString("es-CO",{weekday:"long",day:"numeric",month:"long"})}</p>
          </div>
          <div style={{background:"rgba(255,255,255,0.12)",borderRadius:"14px",padding:"10px 16px",textAlign:"center"}}>
            <div style={{color:"white",fontWeight:"900",fontSize:"28px",lineHeight:1}}>{presHoy}</div>
            <div style={{color:"#93C5FD",fontSize:"10px",fontWeight:"600",marginTop:"2px"}}>presentes</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginTop:"16px",position:"relative",zIndex:1}}>
          {[["📸",actHoy,"Actividades"],["🏷️",precHoy,"Precios"],["⚠️",av.filter(r=>r.fecha===h).length,"Averías"]].map(([i,v,l])=>
            <div key={l} style={{background:"rgba(255,255,255,0.12)",borderRadius:"12px",padding:"10px",textAlign:"center"}}>
              <div style={{fontSize:"20px"}}>{i}</div>
              <div style={{color:"white",fontWeight:"900",fontSize:"22px",lineHeight:1}}>{v}</div>
              <div style={{color:"rgba(255,255,255,0.7)",fontSize:"10px",marginTop:"2px"}}>{l}</div>
            </div>
          )}
        </div>
      </div>

      {/* Donuts — métricas clave */}
      <div style={{background:"white",borderRadius:"20px",padding:"16px",marginBottom:"12px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:"1px solid #E8EDF8"}}>
        <h3 style={{color:"#0F2167",fontWeight:"900",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 14px 0"}}>📊 Rendimiento Hoy</h3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"}}>
          <MiniDonut pct={pctPres} color="#3B6FE8" label="Asistencia" value={presHoy+"/"+totalMercs}/>
          <MiniDonut pct={pctAct}  color="#F97316" label="Actividades" value={actHoy}/>
          <MiniDonut pct={Math.min(invHoy*20,100)} color="#6366F1" label="Inventarios" value={invHoy}/>
          <MiniDonut pct={Math.min(precHoy*10,100)} color="#0D9488" label="Chequeos" value={precHoy}/>
        </div>
      </div>

      {/* Gráfica actividades 7 días */}
      <div style={{background:"white",borderRadius:"20px",padding:"16px",marginBottom:"12px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:"1px solid #E8EDF8"}}>
        <h3 style={{color:"#0F2167",fontWeight:"900",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 14px 0"}}>📈 Actividades — Últimos 7 días</h3>
        <BarChart data={ultimos7} color="#3B6FE8"/>
      </div>

      {/* Gráfica chequeo por producto */}
      {pr.length > 0 && (
        <div style={{background:"white",borderRadius:"20px",padding:"16px",marginBottom:"12px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:"1px solid #E8EDF8"}}>
          <h3 style={{color:"#0F2167",fontWeight:"900",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 14px 0"}}>🏷️ Chequeos por Producto</h3>
          <BarChart data={prodChequeo} color="#0D9488"/>
        </div>
      )}

      {/* Equipo hoy */}
      <div style={{background:"white",borderRadius:"20px",padding:"16px",marginBottom:"12px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:"1px solid #E8EDF8"}}>
        <h3 style={{color:"#0F2167",fontWeight:"900",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 12px 0"}}>👥 Equipo Hoy</h3>
        {MERCS.map(m => {
          const a = as.find(r => r.merc===m.nombre && r.fecha===h);
          const nA = ac.filter(r => r.merc===m.nombre && r.fecha===h).length;
          const nI = inv.filter(r => r.merc===m.nombre && r.fecha===h).length;
          const nP = pr.filter(r => r.merc===m.nombre && r.fecha===h).length;
          return (
            <div key={m.id} style={{padding:"10px 0",borderBottom:"1px solid #F0F4FF"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
                <p style={{fontWeight:"800",fontSize:"13px",color:"#1a2240",margin:0}}>{m.nombre}</p>
                <Tag color={a?"green":"red"}>{a?"✓ Presente":"Ausente"}</Tag>
              </div>
              {/* Mini barra de actividad */}
              <div style={{display:"flex",gap:"6px"}}>
                {[["📸",nA,"act"],["🏷️",nP,"prec"],["📦",nI,"inv"]].map(([ic,val,lb])=>(
                  <div key={lb} style={{background:val>0?"#EEF2FF":"#F8FAFF",borderRadius:"8px",padding:"3px 8px",display:"flex",gap:"4px",alignItems:"center"}}>
                    <span style={{fontSize:"11px"}}>{ic}</span>
                    <span style={{fontSize:"11px",fontWeight:"800",color:val>0?"#3B6FE8":"#CBD5E1"}}>{val}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* Alertas stock */}
      {alertas.length > 0 && (
        <div style={{background:"#FFF7ED",border:"2px solid #FED7AA",borderRadius:"16px",padding:"16px",marginBottom:"12px"}}>
          <p style={{color:"#9A3412",fontWeight:"900",fontSize:"13px",margin:"0 0 10px 0"}}>🔔 Alertas de Stock Bajo</p>
          {alertas.map(r => (
            <div key={r.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid rgba(254,215,170,0.5)"}}>
              <span style={{fontSize:"12px",color:"#C2410C",fontWeight:"500"}}>{r.prod} · {r.almacen}</span>
              <span style={{fontSize:"12px",fontWeight:"900",color:"#991B1B"}}>{r.stock}/{r.stockMin}</span>
            </div>
          ))}
        </div>
      )}

      {/* Acumulado */}
      <div style={{background:"white",borderRadius:"20px",padding:"16px",marginBottom:"12px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:"1px solid #E8EDF8"}}>
        <h3 style={{color:"#0F2167",fontWeight:"900",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 12px 0"}}>📦 Acumulado Total</h3>

// ── CHEQUEO MASIVO DE PRECIOS ──────────────────────────────────────────────
const PRECIOS_UNIMARES = {
  "Camarón Jumbo x 350g (Cód.24)": 16700,
  "Camarón Hogar x 350g (Cód.22)": 14500,
  "Filete de Salmón Porción x 350g (Cód.8)": 25300,
  "Mixtura Mariscos x 500g (Cód.11)": 12000,
  "Filete de Tilapia x 500g (Cód.21)": 11500,
  "Filete de Tilapia x 1000g (Cód.30)": 22300,
  "Bagre Amazonas x 450g (Cód.28)": 18300,
  "Pescado Seco (Cód.188)": 17200,
};

function ChequeoMasivo({data, setData}) {
  const initPrecios = () => {
    const obj = {};
    PRODS.forEach(p => {
      obj[p] = { _unimares: String(PRECIOS_UNIMARES[p]) };
      COMP.forEach(c => { obj[p][c] = ""; });
    });
    return obj;
  };

  const [merc, setMerc] = useState("");
  const [almacen, setAlmacen] = useState("");
  const [fecha, setFecha] = useState(HOY());
  const [precios, setPrecios] = useState(initPrecios());
  const [abiertos, setAbiertos] = useState({});
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState(null);

  const showToast = (msg, ok) => { setToast({msg,ok}); setTimeout(()=>setToast(null), 3500); };

  const toggleProd = (prod) => setAbiertos(prev => ({...prev, [prod]: !prev[prod]}));

  const setVal = (prod, marca, val) => {
    setPrecios(prev => ({...prev, [prod]: {...prev[prod], [marca]: val}}));
  };

  const pct = (pU, pC) => {
    if (!pC || !pU || isNaN(pC) || isNaN(pU)) return null;
    return Math.round(((Number(pC) - Number(pU)) / Number(pU)) * 100);
  };

  const prodLleno = (prod) => COMP.some(c => precios[prod][c] !== "");

  const save = async () => {
    if (!merc || !almacen) return showToast("Selecciona mercaderista y almacén", false);
    setLoading(true);
    let enviados = 0;
    for (const prod of PRODS) {
      if (!prodLleno(prod)) continue;
      const pU = precios[prod]["_unimares"] || PRECIOS_UNIMARES[prod];
      const campos = {
        Fecha: fecha, Mercaderista: merc, Almacen: almacen, Producto: prod,
        PrecioUnimares: pU,
        RicoMar: precios[prod]["Rico Mar"] || "—",
        CincoSierras: precios[prod]["Cinco Sierras"] || "—",
        Vitamar: precios[prod]["Vitamar"] || "—",
        Antillana: precios[prod]["Antillana"] || "—",
        AnclaYViento: precios[prod]["Ancla y Viento"] || "—",
        MarcaBlanca: precios[prod]["Marca Blanca"] || "—",
        Timestamp: TIMESTAMP()
      };
      await enviarASheets("ChequeoMasivo", campos);
      enviados++;
    }
    setLoading(false);
    if (enviados > 0) {
      setData(prev => [...prev, {merc, almacen, fecha, precios, id: Date.now()}]);
      setPrecios(initPrecios());
      setAbiertos({});
      setMerc(""); setAlmacen("");
      showToast(`✓ ${enviados} productos enviados a Sheets`, true);
    } else {
      showToast("Abre al menos un producto y llena precios", false);
    }
  };

  const totalLlenos = PRODS.filter(p => prodLleno(p)).length;

  return (
    <div>
      {toast && <Toast msg={toast.msg} ok={toast.ok}/>}
      <div style={{background:"linear-gradient(135deg,#7C3AED,#5B21B6)",borderRadius:"24px",padding:"20px",marginBottom:"16px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:"-30px",right:"-30px",width:"120px",height:"120px",background:"rgba(255,255,255,0.07)",borderRadius:"50%"}}/>
        <h2 style={{color:"white",fontWeight:"900",fontSize:"22px",margin:"0 0 4px 0",position:"relative",zIndex:1}}>📊 Chequeo Masivo</h2>
        <p style={{color:"rgba(255,255,255,0.7)",fontSize:"12px",margin:0,position:"relative",zIndex:1}}>Toca cada producto para abrir y llenar precios</p>
      </div>

      {/* Cabecera */}
      <Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"8px"}}>
          <Field label="Mercaderista *" type="select" value={merc} onChange={e=>setMerc(e.target.value)} options={MERCS.map(m=>m.nombre)}/>
          <Field label="Almacén *" type="select" value={almacen} onChange={e=>setAlmacen(e.target.value)} options={ALMACENES}/>
        </div>
        <Field label="Fecha" type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
        {totalLlenos > 0 && (
          <div style={{background:"#EEF2FF",borderRadius:"10px",padding:"8px 12px",textAlign:"center"}}>
            <span style={{fontSize:"12px",fontWeight:"700",color:"#4F46E5"}}>✓ {totalLlenos} de {PRODS.length} productos con datos</span>
          </div>
        )}
      </Card>

      {/* Acordeón de productos */}
      <div style={{marginBottom:"80px"}}>
        {PRODS.map(prod => {
          const abierto = !!abiertos[prod];
          const lleno = prodLleno(prod);
          const pU = precios[prod]["_unimares"];
          const cambiado = pU !== String(PRECIOS_UNIMARES[prod]);

          return (
            <div key={prod} style={{background:"white",borderRadius:"16px",marginBottom:"8px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`2px solid ${lleno?"#C4B5FD":abierto?"#E8EDF8":"#E8EDF8"}`,overflow:"hidden",transition:"all 0.2s"}}>

              {/* Header — siempre visible */}
              <div onClick={()=>toggleProd(prod)}
                style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px",cursor:"pointer",background:abierto?"#FAFAFA":"white"}}>
                <div style={{flex:1}}>
                  <p style={{fontWeight:"800",fontSize:"13px",color:"#0F2167",margin:"0 0 2px 0",lineHeight:"1.3"}}>{prod}</p>
                  <div style={{display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"}}>
                    <span style={{fontSize:"11px",fontWeight:"700",color: cambiado?"#D97706":"#3B6FE8",background: cambiado?"#FEF3C7":"#EEF2FF",padding:"2px 7px",borderRadius:"6px"}}>
                      Unimares: ${Number(pU).toLocaleString()} {cambiado?"✏️":""}
                    </span>
                    {lleno && <span style={{fontSize:"11px",fontWeight:"700",color:"#7C3AED",background:"#EDE9FE",padding:"2px 7px",borderRadius:"6px"}}>✓ con datos</span>}
                  </div>
                </div>
                <span style={{fontSize:"20px",color:"#94A3B8",marginLeft:"8px",transition:"transform 0.2s",transform:abierto?"rotate(180deg)":"rotate(0deg)"}}>▼</span>
              </div>

              {/* Contenido desplegable */}
              {abierto && (
                <div style={{padding:"0 14px 14px",borderTop:"1px solid #F0F4FF"}}>

                  {/* Precio Unimares editable */}
                  <div style={{background:"linear-gradient(135deg,#EEF2FF,#E0E7FF)",borderRadius:"12px",padding:"10px 14px",marginBottom:"12px",marginTop:"12px",border:"2px solid #C7D2FE"}}>
                    <label style={{fontSize:"10px",fontWeight:"800",color:"#3730A3",display:"block",marginBottom:"4px",textTransform:"uppercase",letterSpacing:"0.06em"}}>🐟 Unimares (editable)</label>
                    <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                      <span style={{fontSize:"14px",color:"#4F46E5",fontWeight:"700"}}>$</span>
                      <input
                        type="number"
                        value={pU}
                        onChange={e => setVal(prod, "_unimares", e.target.value)}
                        style={{flex:1,border:"none",background:"transparent",fontSize:"18px",fontWeight:"900",color:"#1E1B4B",outline:"none",fontFamily:"inherit"}}
                      />
                      {cambiado && (
                        <button onClick={()=>setVal(prod,"_unimares",String(PRECIOS_UNIMARES[prod]))}
                          style={{fontSize:"10px",background:"#E0E7FF",border:"none",borderRadius:"6px",padding:"3px 7px",cursor:"pointer",color:"#4338CA",fontWeight:"700"}}>
                          Restablecer
                        </button>
                      )}
                    </div>
                  </div>

                  {/* Competidores */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                    {COMP.map(marca => {
                      const val = precios[prod][marca];
                      const p = pct(pU, val);
                      const masBarato = p !== null && p < 0;
                      const masCaro = p !== null && p > 0;
                      const igual = p === 0;
                      return (
                        <div key={marca} style={{
                          background: masBarato?"#FEF2F2": masCaro?"#F0FDF4": igual?"#FFF7ED":"#F8FAFF",
                          borderRadius:"10px", padding:"10px",
                          border:`1px solid ${masBarato?"#FECACA":masCaro?"#BBF7D0":igual?"#FED7AA":"#E8EDF8"}`
                        }}>
                          <label style={{fontSize:"10px",fontWeight:"800",color: masBarato?"#DC2626":masCaro?"#16A34A":"#6B7B9E",display:"block",marginBottom:"4px",textTransform:"uppercase",letterSpacing:"0.04em"}}>{marca}</label>
                          <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
                            <span style={{fontSize:"13px",color:"#94A3B8",fontWeight:"600"}}>$</span>
                            <input
                              type="number"
                              placeholder="—"
                              value={val}
                              onChange={e => setVal(prod, marca, e.target.value)}
                              style={{flex:1,border:"none",background:"transparent",fontSize:"15px",fontWeight:"800",color:"#1a2240",outline:"none",fontFamily:"inherit",width:"100%"}}
                            />
                          </div>
                          {p !== null && (
                            <div style={{fontSize:"10px",fontWeight:"800",marginTop:"3px",color: masBarato?"#DC2626":masCaro?"#16A34A":"#D97706"}}>
                              {masBarato ? `▼ ${Math.abs(p)}% más barato` : masCaro ? `▲ ${p}% más caro` : `= Mismo precio`}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{position:"sticky",bottom:"80px",zIndex:50,marginBottom:"12px"}}>
        <Btn onClick={save} loading={loading}
          gradient="linear-gradient(135deg,#7C3AED,#5B21B6)"
          shadow="0 4px 20px rgba(124,58,237,0.4)">
          {totalLlenos > 0 ? `Enviar ${totalLlenos} productos → Sheets` : "Enviar Chequeo → Sheets"}
        </Btn>
      </div>

      {/* Historial */}
      {data.length > 0 && (
        <Card>
          <h3 style={{color:"#0F2167",fontWeight:"900",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 12px 0"}}>Últimos chequeos ({data.length})</h3>
          {data.slice(-3).reverse().map(r => (
            <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #F0F4FF"}}>
              <div>
                <p style={{fontWeight:"700",fontSize:"13px",color:"#1a2240",margin:"0 0 2px 0"}}>{r.almacen}</p>
                <p style={{fontSize:"11px",color:"#6B7B9E",margin:0}}>{r.merc} · {r.fecha}</p>
              </div>
              <div style={{background:"#EEF2FF",borderRadius:"8px",padding:"4px 10px"}}>
                <span style={{fontSize:"11px",fontWeight:"700",color:"#4F46E5"}}>{PRODS.filter(p=>COMP.some(c=>r.precios[p][c]!=="")).length} prods</span>
              </div>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}


// ── SUPERVISOR ─────────────────────────────────────────────────────────────
function Supervisor() {
  const [fecha, setFecha] = React.useState(HOY());
  const [resumen, setResumen] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [selMerc, setSelMerc] = React.useState(null);

  const HOJAS = ["Asistencia","Actividades","ChequeoMasivo","Inventario","Averias"];
  const cargar = function() {
    setLoading(true);
    setError(null);
    setResumen(null);
    var cbName = "uniCb_" + Date.now();
    var url = SCRIPT_URL + "?fecha=" + fecha + "&callback=" + cbName;
    var script = document.createElement("script");
    script.type = "text/javascript";
    script.src = url;
    var timer = setTimeout(function() {
      cleanup();
      setLoading(false);
      setError("Tiempo agotado. Verifica el Apps Script.");
    }, 12000);
    var cleanup = function() {
      try { delete window[cbName]; } catch(e2) {}
      try { if (script.parentNode) document.body.removeChild(script); } catch(e2) {}
      clearTimeout(timer);
    };
    window[cbName] = function(json) {
      cleanup();
      setLoading(false);
      if (json && json.status === "ok") { setResumen(json.resumen); }
      else { setError((json && json.msg) || "Error al leer Sheets"); }
    };
    script.onerror = function() {
      cleanup();
      setLoading(false);
      setError("No se pudo conectar. Verifica tu conexion.");
    };
    try {
      document.body.appendChild(script);
    } catch(e) {
      setLoading(false);
      setError("Error al conectar: " + e.message);
    }
  };

  React.useEffect(function() { cargar(); }, []);

  var totalHoy = resumen ? Object.keys(resumen).length : 0;
  var totalRegs = resumen ? Object.values(resumen).reduce(function(a,m){ return a + Object.values(m).reduce(function(b,v){ return b+v; },0); },0) : 0;

  if (selMerc !== null) {
    var datos = (resumen && resumen[selMerc]) || {};
    var totalMerc = Object.values(datos).reduce(function(a,v){ return a+v; },0);
    return (
      <div>
        <button onClick={function(){ setSelMerc(null); }}
          style={{display:"flex",alignItems:"center",gap:"8px",background:"white",border:"1px solid #E8EDF8",borderRadius:"12px",padding:"10px 16px",cursor:"pointer",fontFamily:"inherit",fontWeight:"700",color:"#0F2167",marginBottom:"16px",fontSize:"13px"}}>
          &lt; Volver
        </button>
        <div style={{background:"linear-gradient(135deg,#0F766E,#0D9488)",borderRadius:"20px",padding:"16px",marginBottom:"16px"}}>
          <p style={{color:"white",fontWeight:"900",fontSize:"18px",margin:"0 0 2px 0"}}>{selMerc}</p>
          <p style={{color:"rgba(255,255,255,0.7)",fontSize:"12px",margin:0}}>{totalMerc} registros el {fecha}</p>
        </div>
        {HOJAS.map(function(h) {
          var cant = datos[h] || 0;
          var pct = totalMerc > 0 ? Math.round((cant/totalMerc)*100) : 0;
          var colores = {"Asistencia":"#3B6FE8","Actividades":"#F97316","ChequeoMasivo":"#0D9488","Inventario":"#6366F1","Averias":"#EF4444"};
          var emojiMap = {"Asistencia":"🕐","Actividades":"📸","ChequeoMasivo":"🏷️","Inventario":"📦","Averias":"⚠️"};
          var col = colores[h] || "#3B6FE8";
          return (
            <div key={h} style={{background:"white",borderRadius:"14px",padding:"14px",marginBottom:"10px",border:"1px solid #E8EDF8"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                  <span style={{fontSize:"18px"}}>{emojiMap[h]}</span>
                  <span style={{fontSize:"13px",fontWeight:"800",color:"#1a2240"}}>{h}</span>
                </div>
                <div style={{background:cant>0?"#DCFCE7":"#F1F5F9",borderRadius:"8px",padding:"4px 12px"}}>
                  <span style={{fontSize:"14px",fontWeight:"900",color:cant>0?"#16A34A":"#CBD5E1"}}>{cant}</span>
                </div>
              </div>
              <div style={{height:"8px",background:"#F0F4FF",borderRadius:"4px",overflow:"hidden"}}>
                <div style={{width:pct+"%",height:"100%",background:col,borderRadius:"4px"}}/>
              </div>
              <p style={{fontSize:"11px",color:"#94A3B8",margin:"4px 0 0",fontWeight:"600"}}>{pct}% del total</p>
            </div>
          );
        })}
      </div>
    );
  }

  return (
    <div>
      <div style={{background:"linear-gradient(135deg,#0F766E,#0D9488)",borderRadius:"24px",padding:"20px",marginBottom:"16px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:"-30px",right:"-30px",width:"120px",height:"120px",background:"rgba(255,255,255,0.07)",borderRadius:"50%"}}/>
        <h2 style={{color:"white",fontWeight:"900",fontSize:"22px",margin:"0 0 4px 0",position:"relative",zIndex:1}}>👔 Supervisor</h2>
        <p style={{color:"rgba(255,255,255,0.75)",fontSize:"12px",margin:0,position:"relative",zIndex:1}}>Toca un nombre para ver su detalle</p>
      </div>

      <div style={{background:"white",borderRadius:"16px",padding:"14px",marginBottom:"12px",border:"1px solid #E8EDF8"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:"10px",alignItems:"flex-end"}}>
          <Field label="Fecha" type="date" value={fecha} onChange={function(e){ setFecha(e.target.value); }}/>
          <button onClick={cargar} disabled={loading}
            style={{background:"linear-gradient(135deg,#0F766E,#0D9488)",color:"white",border:"none",borderRadius:"12px",padding:"10px 16px",fontWeight:"800",fontSize:"13px",cursor:"pointer",fontFamily:"inherit",marginBottom:"12px"}}>
            {loading ? "⏳" : "🔄"}

        {resumen && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
            <div style={{background:"#CCFBF1",borderRadius:"10px",padding:"8px",textAlign:"center"}}>
              <p style={{fontSize:"22px",fontWeight:"900",color:"#0F766E",margin:0}}>{totalHoy}</p>
              <p style={{fontSize:"10px",color:"#0D9488",fontWeight:"700",margin:0}}>Activos hoy</p>

              <p style={{fontSize:"22px",fontWeight:"900",color:"#1E40AF",margin:0}}>{totalRegs}</p>
              <p style={{fontSize:"10px",color:"#2563EB",fontWeight:"700",margin:0}}>Total registros</p>
            </div>
          </div>
        )}
      </div>

      {error && (
        <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:"14px",padding:"14px",marginBottom:"12px",textAlign:"center"}}>

          <p style={{color:"#6B7B9E",fontSize:"13px",fontWeight:"600",margin:0}}>Consultando Google Sheets...</p>

      )}

      {resumen && !loading && MERCS.map(function(m) {
        var datos = resumen[m.nombre] || {};
        var tieneAlgo = Object.keys(datos).length > 0;
        var total = Object.values(datos).reduce(function(a,v){ return a+v; },0);
        var emojiMap = {"Asistencia":"🕐","Actividades":"📸","ChequeoMasivo":"🏷️","Inventario":"📦","Averias":"⚠️"};
        return (
          <div key={m.id} onClick={function(){ setSelMerc(m.nombre); }}

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:tieneAlgo?"8px":"0"}}>
              <div>
                <p style={{fontWeight:"800",fontSize:"13px",color:"#0F2167",margin:"0 0 2px 0"}}>{m.nombre}</p>
                <p style={{fontSize:"11px",color:tieneAlgo?"#0D9488":"#EF4444",margin:0,fontWeight:"700"}}>
                  {tieneAlgo ? total+" registros — ver detalle" : "Sin actividad hoy"}
                </p>
              </div>
              <span style={{fontSize:"18px",color:"#94A3B8"}}>›</span>
            </div>
            {tieneAlgo && (
              <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                {HOJAS.map(function(h) {
                  var cant = datos[h] || 0;
                  if (!cant) return null;
                  return (
                    <div key={h} style={{background:"#EEF2FF",borderRadius:"8px",padding:"3px 8px",display:"flex",gap:"4px",alignItems:"center"}}>
                      <span style={{fontSize:"11px"}}>{emojiMap[h]}</span>
                      <span style={{fontSize:"11px",fontWeight:"800",color:"#3B6FE8"}}>{cant}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}

      {resumen && !loading && Object.keys(resumen).length === 0 && (
        <div style={{background:"white",borderRadius:"16px",padding:"30px",textAlign:"center"}}>
          <p style={{fontSize:"32px",margin:"0 0 8px"}}>📭</p>
          <p style={{color:"#1a2240",fontWeight:"800",fontSize:"14px",margin:"0 0 4px"}}>Sin registros para esta fecha</p>
          <p style={{color:"#94A3B8",fontSize:"12px",margin:0}}>El equipo aun no ha subido actividades</p>
        </div>
      )}
    </div>
  );
}

// ── STORAGE ────────────────────────────────────────────────────────────────
const STORE_KEY = "unimares_v1";
const loadStore = () => { try { const r = localStorage.getItem(STORE_KEY); return r ? JSON.parse(r) : {}; } catch(e) { return {}; } };
const saveStore = (k, v) => { try { const s = loadStore(); s[k]=v; localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch(e) {} };

function usePersistedState(key, def) {
  const [val, setVal] = React.useState(() => { const s = loadStore(); return s[key] !== undefined ? s[key] : def; });
  React.useEffect(() => { saveStore(key, val); }, [val]);
  return [val, setVal];
}

function App() {
  const [usuario, setUsuario] = React.useState(() => {
    try { const s = loadStore(); return s["session"] || null; } catch(e) { return null; }
  });
  const [tab, setTab] = useState("dash");
  const [as, setAs] = usePersistedState("asistencia", []);
  const [ac, setAc] = usePersistedState("actividades", []);
  const [pr, setPr] = usePersistedState("precios", []);
  const [cm, setCm] = usePersistedState("chequeo", []);
  const [inv, setInv] = usePersistedState("inventario", []);
  const [av, setAv] = usePersistedState("averias", []);

  const fechaHoy = () => {
    const d = new Date();
    return d.toLocaleDateString("es-CO", {weekday:"long", day:"numeric", month:"long", year:"numeric"});
  };

  const limpiarAnteriores = () => {
    const hoy = HOY();
    if (!confirm("¿Limpiar registros de días anteriores? Los de hoy se conservan.")) return;
    setAs(p => p.filter(r => r.fecha === hoy));
    setAc(p => p.filter(r => r.fecha === hoy));
    setPr(p => p.filter(r => r.fecha === hoy));
    setCm(p => p.filter(r => r.fecha === hoy));
    setInv(p => p.filter(r => r.fecha === hoy));
    setAv(p => p.filter(r => r.fecha === hoy));
  };

  const handleLogin = (user) => {
    saveStore("session", user);
    setUsuario(user);
    setTab("dash");
  };

  const handleLogout = () => {
    saveStore("session", null);
    setUsuario(null);
  };

  if (!usuario) return <Login onLogin={handleLogin}/>;
  return (
    <div style={{minHeight:"100vh",background:"#F0F4FF",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      <div style={{maxWidth:"420px",margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
        {/* Top bar con logo y fecha */}
        <div style={{background:"linear-gradient(135deg,#0F2167,#1a3a8f)",padding:"8px 16px",position:"sticky",top:0,zIndex:200,boxShadow:"0 2px 12px rgba(15,33,103,0.4)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <img src="https://lobomarketer-byte.github.io/unimares-tracker/logo10.png" alt="Unimares" style={{height:"36px",objectFit:"contain",maxWidth:"140px"}}/>
            <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"2px"}}>
              <p style={{color:"#93C5FD",fontSize:"10px",margin:0,fontWeight:"600",textTransform:"capitalize",lineHeight:"1.3"}}>{fechaHoy()}</p>
              <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                <p style={{color:"#60A5FA",fontSize:"10px",margin:0,fontWeight:"600"}}>{usuario.nombre.split(" ")[0]}</p>
                <button onClick={handleLogout} style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:"6px",padding:"2px 7px",color:"rgba(255,255,255,0.7)",fontSize:"10px",cursor:"pointer",fontFamily:"inherit",fontWeight:"700"}}>Salir</button>
              </div>
            </div>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"16px 12px 100px"}}>
          {tab==="dash"   && <Dashboard as={as} ac={ac} pr={pr} inv={inv} av={av} limpiar={limpiarAnteriores}/>}
          {tab==="asist"  && <Asistencia data={as} setData={setAs}/>}
          {tab==="activ"  && <Actividades data={ac} setData={setAc}/>}
          {tab==="masivo" && <ChequeoMasivo data={cm} setData={setCm}/>}
          {tab==="inv"    && <Inventario data={inv} setData={setInv}/>}
          {tab==="aver"   && <Averias data={av} setData={setAv}/>}
          {tab==="super"  && <Supervisor/>}
        </div>
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(255,255,255,0.97)",backdropFilter:"blur(12px)",borderTop:"1px solid #E8EDF8",padding:"6px 4px",zIndex:100,boxShadow:"0 -4px 20px rgba(0,0,0,0.08)"}}>
          <div style={{display:"flex",justifyContent:"space-around",maxWidth:"420px",margin:"0 auto",overflowX:"auto",gap:"2px"}}>
            {TABS.filter(t => t.id !== 'super' || usuario.rol === 'supervisor').map(t => (
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"1px",padding:"5px 6px",borderRadius:"10px",border:"none",cursor:"pointer",background:tab===t.id?"#EEF2FF":"transparent",transition:"all 0.15s",fontFamily:"inherit",flexShrink:0}}>
                <span style={{fontSize:"18px",lineHeight:1}}>{t.i}</span>
                <span style={{fontSize:"9px",fontWeight:"700",color:tab===t.id?"#3B6FE8":"#94A3B8"}}>{t.l}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
} catch(e) {
  document.getElementById("root").innerHTML = '<div style="padding:20px;font-family:monospace;color:red"><h3>Runtime Error:</h3><pre>' + e.message + '</pre><pre>' + e.stack + '</pre></div>';
}
</script>
</body>
</html>
