<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unimares Tracker — Gestión Mercaderistas</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  body { margin: 0; background: #F0F4FF; }
  select, input, textarea { appearance: none; -webkit-appearance: none; font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyGJY-8PhZFBRtEIdtbu4f7e9lxCVTSn0D1MZ-HkYr7IGRzrV1cgz3DxYwlMWZr5a5jag/exec";

const ALMACENES = ["Éxito Ibagué Centro","Éxito Ibagué Norte","Jumbo Ibagué","Carulla La Estación","Mercacentro No. 10","Olímpica Ibagué","Populares","Surtiplaza La 37","Surtiplaza Acqua","Surtiplaza El Salado"];
const MERCS = [{id:1,nombre:"Ruby Gracia",almacen:"Todos",rol:"Mercaderista"},{id:2,nombre:"Mercadeo 1",almacen:"",rol:"Mercaderista"},{id:3,nombre:"Mercadeo 2",almacen:"",rol:"Mercaderista"},{id:4,nombre:"Supervisor / Jefe",almacen:"Todos",rol:"Supervisor"}];
const PRODS = ["Camarón Jumbo x 350g (Cód.24)","Camarón Hogar x 350g (Cód.22)","Filete de Salmón Porción x 350g (Cód.8)","Mixtura Mariscos x 500g (Cód.11)","Filete de Tilapia x 500g (Cód.21)","Filete de Tilapia x 1000g (Cód.30)","Bagre Amazonas x 450g (Cód.28)","Pescado Seco (Cód.188)"];
const COMP = ["Rico Mar","Cinco Sierras","Vitamar","Antillana","Ancla y Viento","Marca Blanca"];
const HOY = () => new Date().toISOString().split("T")[0];
const HORA = () => new Date().toTimeString().slice(0,5);

// ── ENVIAR A GOOGLE SHEETS ─────────────────────────────────────────────────
async function enviarASheets(modulo, campos) {
  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ modulo, campos })
    });
    return true;
  } catch(e) {
    console.error("Error enviando a Sheets:", e);
    return false;
  }
}

// ── COMPONENTES BASE ───────────────────────────────────────────────────────
function Field({label, type="text", value, onChange, options, rows=3}) {
  const css = {background:"#F0F4FF",border:"none",borderRadius:"12px",padding:"10px 14px",fontSize:"14px",width:"100%",outline:"none",color:"#1a2240",fontFamily:"inherit"};
  return (
    <div style={{marginBottom:"12px"}}>
      {label && <label style={{fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.06em",color:"#3B6FE8",display:"block",marginBottom:"4px"}}>{label}</label>}
      {type==="select"
        ? <select value={value} onChange={onChange} style={css}>
            <option value="">— Seleccionar —</option>
            {options.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
        : type==="textarea"
        ? <textarea value={value} onChange={onChange} rows={rows} style={css}/>
        : <input type={type} value={value} onChange={onChange} style={css}/>
      }
    </div>
  );
}

function Tag({color, children}) {
  const c = {
    green:{background:"#DCFCE7",color:"#166534"},red:{background:"#FEE2E2",color:"#991B1B"},
    blue:{background:"#DBEAFE",color:"#1E40AF"},orange:{background:"#FFEDD5",color:"#9A3412"},
    yellow:{background:"#FEF9C3",color:"#854D0E"},teal:{background:"#CCFBF1",color:"#0F766E"},
    gray:{background:"#F1F5F9",color:"#475569"},
  };
  const s = c[color]||c.gray;
  return <span style={{...s,fontSize:"11px",fontWeight:"700",padding:"3px 10px",borderRadius:"9999px",whiteSpace:"nowrap"}}>{children}</span>;
}

function Btn({onClick, gradient, shadow, children, loading}) {
  return (
    <button onClick={onClick} disabled={loading}
      style={{width:"100%",fontWeight:"700",padding:"14px",borderRadius:"12px",fontSize:"14px",border:"none",cursor:loading?"not-allowed":"pointer",background:loading?"#CBD5E1":gradient,color:"white",boxShadow:loading?"none":shadow,transition:"all 0.15s",fontFamily:"inherit",opacity:loading?0.7:1}}
      onMouseDown={e=>!loading&&(e.currentTarget.style.transform="scale(0.97)")}
      onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}
      onTouchStart={e=>!loading&&(e.currentTarget.style.transform="scale(0.97)")}
      onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}
    >
      {loading ? "⏳ Guardando en Sheets..." : children}
    </button>
  );
}

function Card({children, style={}}) {
  return <div style={{background:"white",borderRadius:"16px",padding:"16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:"1px solid #E8EDF8",marginBottom:"12px",...style}}>{children}</div>;
}

function SectionHead({gradient, title, sub}) {
  return (
    <div style={{background:gradient,borderRadius:"24px",padding:"20px",marginBottom:"16px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:"-30px",right:"-30px",width:"120px",height:"120px",background:"rgba(255,255,255,0.07)",borderRadius:"50%"}}/>
      <h2 style={{color:"white",fontWeight:"900",fontSize:"22px",margin:"0 0 4px 0",position:"relative",zIndex:1}}>{title}</h2>
      <p style={{color:"rgba(255,255,255,0.7)",fontSize:"12px",margin:0,position:"relative",zIndex:1}}>{sub}</p>
    </div>
  );
}

function Checkbox({checked, onChange, label, activeColor="#16A34A", activeBg="#DCFCE7", activeBorder="#16A34A"}) {
  return (
    <div onClick={()=>onChange(!checked)} style={{display:"flex",alignItems:"center",gap:"12px",borderRadius:"12px",padding:"12px",marginBottom:"12px",cursor:"pointer",background:checked?activeBg:"#F0F4FF",border:`2px solid ${checked?activeBorder:"transparent"}`,transition:"all 0.15s"}}>
      <div style={{width:"20px",height:"20px",borderRadius:"6px",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:checked?activeColor:"white",border:checked?"none":"2px solid #CBD5E1",transition:"all 0.15s"}}>
        {checked && <span style={{color:"white",fontSize:"11px",fontWeight:"900"}}>✓</span>}
      </div>
      <span style={{fontSize:"14px",fontWeight:"600",color:checked?"#166534":"#475569"}}>{label}</span>
    </div>
  );
}

function Toast({msg, ok}) {
  if (!msg) return null;
  return (
    <div style={{position:"fixed",top:"16px",left:"50%",transform:"translateX(-50%)",background:ok?"#166534":"#991B1B",color:"white",padding:"10px 20px",borderRadius:"12px",fontSize:"13px",fontWeight:"700",zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,0.2)",whiteSpace:"nowrap"}}>
      {ok?"✅":"❌"} {msg}
    </div>
  );
}

function StatCard({icon, value, label, gradient}) {
  return (
    <div style={{background:gradient,borderRadius:"16px",padding:"14px",color:"white"}}>
      <div style={{fontSize:"24px",marginBottom:"4px"}}>{icon}</div>
      <div style={{fontSize:"32px",fontWeight:"900",lineHeight:1}}>{value}</div>
      <div style={{fontSize:"11px",fontWeight:"600",opacity:0.85,marginTop:"4px",lineHeight:"1.3"}}>{label}</div>
    </div>
  );
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function Dashboard({as, ac, pr, inv, av}) {
  const h = HOY();
  const alertas = inv.filter(r => r.stockMin && Number(r.stock) <= Number(r.stockMin));
  return (
    <div>
      <div style={{background:"linear-gradient(135deg,#0F2167,#1a3a8f,#0f4c8f)",borderRadius:"24px",padding:"20px",marginBottom:"16px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:"-32px",right:"-32px",width:"128px",height:"128px",background:"rgba(255,255,255,0.06)",borderRadius:"50%"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",position:"relative",zIndex:1}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}}>
              <span style={{fontSize:"28px"}}>🐟</span>
              <span style={{color:"white",fontWeight:"900",fontSize:"20px"}}>UNIMARES</span>
            </div>
            <p style={{color:"#93C5FD",fontSize:"12px",margin:"0 0 2px 0",fontWeight:"500"}}>Gestión Mercaderistas · Ibagué</p>
            <p style={{color:"#60A5FA",fontSize:"11px",margin:0}}>{new Date().toLocaleDateString("es-CO",{weekday:"long",day:"numeric",month:"long"})}</p>
          </div>
          <div style={{background:"rgba(255,255,255,0.12)",borderRadius:"14px",padding:"10px 16px",textAlign:"center"}}>
            <div style={{color:"white",fontWeight:"900",fontSize:"28px",lineHeight:1}}>{as.filter(r=>r.fecha===h).length}</div>
            <div style={{color:"#93C5FD",fontSize:"10px",fontWeight:"600",marginTop:"2px"}}>presentes</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginTop:"16px",position:"relative",zIndex:1}}>
          {[["📸",ac.filter(r=>r.fecha===h).length,"Actividades"],["💰",pr.filter(r=>r.fecha===h).length,"Precios"],["⚠️",av.filter(r=>r.fecha===h).length,"Averías"]].map(([i,v,l])=>
            <div key={l} style={{background:"rgba(255,255,255,0.12)",borderRadius:"12px",padding:"10px",textAlign:"center"}}>
              <div style={{fontSize:"20px"}}>{i}</div>
              <div style={{color:"white",fontWeight:"900",fontSize:"22px",lineHeight:1}}>{v}</div>
              <div style={{color:"rgba(255,255,255,0.7)",fontSize:"10px",marginTop:"2px"}}>{l}</div>
            </div>
          )}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"12px"}}>
        <StatCard icon="🕐" value={as.filter(r=>r.fecha===h).length} label="Asistencias hoy" gradient="linear-gradient(135deg,#3B6FE8,#2952C0)"/>
        <StatCard icon="📦" value={inv.filter(r=>r.fecha===h).length} label="Inventarios hoy" gradient="linear-gradient(135deg,#6366F1,#4F46E5)"/>
        <StatCard icon="🔔" value={alertas.length} label="Alertas stock bajo" gradient={alertas.length>0?"linear-gradient(135deg,#EF4444,#DC2626)":"linear-gradient(135deg,#0D9488,#0F766E)"}/>
        <StatCard icon="📊" value={ac.length} label="Total actividades" gradient="linear-gradient(135deg,#F97316,#EA580C)"/>
      </div>

      <div style={{background:"#E0F2FE",border:"1px solid #BAE6FD",borderRadius:"16px",padding:"12px 16px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px"}}>
        <span style={{fontSize:"20px"}}>📊</span>
        <div>
          <p style={{margin:0,fontSize:"12px",fontWeight:"700",color:"#0369A1"}}>Datos guardados en Google Sheets</p>
          <p style={{margin:0,fontSize:"11px",color:"#0284C7"}}>Cada registro se envía automáticamente a tu hoja de cálculo</p>
        </div>
      </div>

      <Card>
        <h3 style={{color:"#0F2167",fontWeight:"900",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 12px 0"}}>👥 Equipo hoy</h3>
        {MERCS.map(m => {
          const a = as.find(r => r.merc===m.nombre && r.fecha===h);
          const nA = ac.filter(r => r.merc===m.nombre && r.fecha===h).length;
          return (
            <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #F0F4FF"}}>
              <div>
                <p style={{fontWeight:"700",fontSize:"14px",color:"#1a2240",margin:"0 0 2px 0"}}>{m.nombre}</p>
                <p style={{fontSize:"11px",color:"#6B7B9E",margin:0}}>{m.almacen}</p>
              </div>
              <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                <Tag color="blue">{nA} act.</Tag>
                <Tag color={a?"green":"red"}>{a?"✓ Pres.":"Ausente"}</Tag>
              </div>
            </div>
          );
        })}
      </Card>

      {alertas.length > 0 && (
        <div style={{background:"#FFF7ED",border:"2px solid #FED7AA",borderRadius:"16px",padding:"16px",marginBottom:"12px"}}>
          <p style={{color:"#9A3412",fontWeight:"900",fontSize:"13px",margin:"0 0 10px 0"}}>🔔 Alertas de Stock Bajo</p>
          {alertas.map(r => (
            <div key={r.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid rgba(254,215,170,0.5)"}}>
              <span style={{fontSize:"12px",color:"#C2410C",fontWeight:"500"}}>{r.prod} · {r.almacen}</span>
              <span style={{fontSize:"12px",fontWeight:"900",color:"#991B1B"}}>{r.stock}/{r.stockMin}</span>
            </div>
          ))}
        </div>
      )}

      <Card>
        <h3 style={{color:"#0F2167",fontWeight:"900",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 12px 0"}}>📈 Acumulado Total</h3>
        {[["Asistencias totales",as.length],["Actividades totales",ac.length],["Vs Competencia",ac.filter(a=>a.esComp).length],["Chequeos de precios",pr.length],["Inventarios cíclicos",inv.length],["Averías registradas",av.length]].map(([l,v]) =>
          <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #F0F4FF"}}>
            <span style={{fontSize:"13px",color:"#475569"}}>{l}</span>
            <span style={{fontWeight:"900",color:"#0F2167",fontSize:"14px"}}>{v}</span>
          </div>
        )}
      </Card>
    </div>
  );
}

// ── ASISTENCIA ─────────────────────────────────────────────────────────────
function Asistencia({data, setData}) {
  const [f, setF] = useState({merc:"",almacen:"",fecha:HOY(),entrada:HORA(),salida:"",firma:false,obs:""});
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState(null);

  const showToast = (msg, ok) => { setToast({msg,ok}); setTimeout(()=>setToast(null),3000); };

  const save = async () => {
    if (!f.merc || !f.almacen) return showToast("Selecciona mercaderista y almacén", false);
    setLoading(true);
    const campos = {
      Fecha: f.fecha, Mercaderista: f.merc, Almacen: f.almacen,
      HoraEntrada: f.entrada, HoraSalida: f.salida||"—",
      Firma: f.firma?"Sí":"No", Observaciones: f.obs, Timestamp: new Date().toISOString()
    };
    const ok = await enviarASheets("Asistencia", campos);
    setLoading(false);
    if (ok) {
      setData(p => [...p, {...f, id:Date.now()}]);
      setF({merc:"",almacen:"",fecha:HOY(),entrada:HORA(),salida:"",firma:false,obs:""});
      showToast("Guardado en Google Sheets ✓", true);
    } else {
      showToast("Error al guardar. Intenta de nuevo.", false);
    }
  };

  const hoy = data.filter(r => r.fecha===HOY());
  return (
    <div>
      {toast && <Toast msg={toast.msg} ok={toast.ok}/>}
      <SectionHead gradient="linear-gradient(135deg,#0F2167,#1E3A8A)" title="🕐 Asistencia" sub="Registro de horarios de gestión"/>
      <Card>
        <Field label="Mercaderista *" type="select" value={f.merc} onChange={e=>setF({...f,merc:e.target.value})} options={MERCS.map(m=>m.nombre)}/>
        <Field label="Almacén *" type="select" value={f.almacen} onChange={e=>setF({...f,almacen:e.target.value})} options={ALMACENES}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
          <Field label="Hora Entrada" type="time" value={f.entrada} onChange={e=>setF({...f,entrada:e.target.value})}/>
          <Field label="Hora Salida" type="time" value={f.salida} onChange={e=>setF({...f,salida:e.target.value})}/>
        </div>
        <Checkbox checked={f.firma} onChange={v=>setF({...f,firma:v})} label="✍️ Confirmar firma de asistencia"/>
        <Field label="Observaciones" type="textarea" value={f.obs} onChange={e=>setF({...f,obs:e.target.value})} rows={2}/>
        <Btn onClick={save} loading={loading} gradient="linear-gradient(135deg,#3B6FE8,#2952C0)" shadow="0 4px 15px rgba(59,111,232,0.35)">Registrar Asistencia → Sheets</Btn>
      </Card>
      {hoy.length > 0 && (
        <Card>
          <h3 style={{color:"#0F2167",fontWeight:"900",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 12px 0"}}>Hoy — {hoy.length} registros</h3>
          {hoy.map(r => (
            <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #F0F4FF"}}>
              <div>
                <p style={{fontWeight:"700",fontSize:"14px",color:"#1a2240",margin:"0 0 2px 0"}}>{r.merc}</p>
                <p style={{fontSize:"11px",color:"#6B7B9E",margin:0}}>{r.almacen} · {r.entrada}→{r.salida||"—"}</p>
              </div>
              <Tag color={r.firma?"green":"yellow"}>{r.firma?"Firmado ✓":"Sin firma"}</Tag>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}

// ── ACTIVIDADES ────────────────────────────────────────────────────────────
function Actividades({data, setData}) {
  const TIPOS = ["Surtido de producto","Exhibición / Visibilidad","Planograma","Evacuación producto","Material POP","Degustación","Rotación FIFO","Bloqueo góndola","Otro"];
  const [f, setF] = useState({merc:"",almacen:"",fecha:HOY(),hora:HORA(),tipo:"",desc:"",esComp:false,marcaComp:"",foto:false});
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState(null);
  const showToast = (msg, ok) => { setToast({msg,ok}); setTimeout(()=>setToast(null),3000); };

  const save = async () => {
    if (!f.merc || !f.tipo) return showToast("Selecciona mercaderista y tipo de actividad", false);
    setLoading(true);
    const campos = {
      Fecha: f.fecha, Hora: f.hora, Mercaderista: f.merc, Almacen: f.almacen,
      TipoActividad: f.tipo, Descripcion: f.desc,
      EsCompetencia: f.esComp?"Sí":"No", MarcaCompetencia: f.marcaComp||"—",
      FotoAdjunta: f.foto?"Sí":"No", Timestamp: new Date().toISOString()
    };
    const ok = await enviarASheets("Actividades", campos);
    setLoading(false);
    if (ok) {
      setData(p => [...p, {...f, id:Date.now()}]);
      setF({merc:"",almacen:"",fecha:HOY(),hora:HORA(),tipo:"",desc:"",esComp:false,marcaComp:"",foto:false});
      showToast("Guardado en Google Sheets ✓", true);
    } else showToast("Error al guardar. Intenta de nuevo.", false);
  };

  return (
    <div>
      {toast && <Toast msg={toast.msg} ok={toast.ok}/>}
      <SectionHead gradient="linear-gradient(135deg,#EA580C,#C2410C)" title="📸 Actividades" sub="Merchandising, visibilidad y evacuación"/>
      <Card>
        <Field label="Mercaderista *" type="select" value={f.merc} onChange={e=>setF({...f,merc:e.target.value})} options={MERCS.map(m=>m.nombre)}/>
        <Field label="Almacén" type="select" value={f.almacen} onChange={e=>setF({...f,almacen:e.target.value})} options={ALMACENES}/>
        <Field label="Tipo de Actividad *" type="select" value={f.tipo} onChange={e=>setF({...f,tipo:e.target.value})} options={TIPOS}/>
        <Checkbox checked={f.esComp} onChange={v=>setF({...f,esComp:v})} label="🏷️ Actividad de la competencia" activeColor="#F97316" activeBg="#FFEDD5" activeBorder="#F97316"/>
        {f.esComp && <Field label="Marca competencia" type="select" value={f.marcaComp} onChange={e=>setF({...f,marcaComp:e.target.value})} options={COMP}/>}
        <Field label="Descripción / Notas" type="textarea" value={f.desc} onChange={e=>setF({...f,desc:e.target.value})} rows={2}/>
        <div onClick={()=>setF({...f,foto:!f.foto})} style={{border:`2px dashed ${f.foto?"#16A34A":"#CBD5E1"}`,borderRadius:"12px",padding:"16px",textAlign:"center",marginBottom:"12px",cursor:"pointer",background:f.foto?"#DCFCE7":"#F8FAFF",transition:"all 0.15s"}}>
          <span style={{fontSize:"28px"}}>{f.foto?"✅":"📷"}</span>
          <p style={{fontSize:"12px",fontWeight:"600",margin:"4px 0 0 0",color:f.foto?"#166534":"#94A3B8"}}>{f.foto?"Foto adjuntada":"Toca para marcar foto"}</p>
        </div>
        <Btn onClick={save} loading={loading} gradient="linear-gradient(135deg,#F97316,#EA580C)" shadow="0 4px 15px rgba(249,115,22,0.35)">Guardar Actividad → Sheets</Btn>
      </Card>
      {data.length > 0 && (
        <Card>
          <h3 style={{color:"#0F2167",fontWeight:"900",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 12px 0"}}>Últimas {Math.min(data.length,5)}</h3>
          {data.slice(-5).reverse().map(r => (
            <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"10px 0",borderBottom:"1px solid #F0F4FF"}}>
              <div style={{flex:1,marginRight:"8px"}}>
                <p style={{fontWeight:"700",fontSize:"13px",color:"#1a2240",margin:"0 0 2px 0"}}>{r.tipo}</p>
                <p style={{fontSize:"11px",color:"#6B7B9E",margin:0}}>{r.merc} · {r.almacen}</p>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px"}}>
                <Tag color={r.esComp?"orange":"blue"}>{r.esComp?r.marcaComp:"Unimares"}</Tag>
                {r.foto && <Tag color="green">📷</Tag>}
              </div>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}

// ── PRECIOS ────────────────────────────────────────────────────────────────
function Precios({data, setData}) {
  const [f, setF] = useState({merc:"",almacen:"",fecha:HOY(),prod:"",pU:"",pC:"",marca:"",oferta:false,obs:""});
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState(null);

        <Field label="Observaciones" type="textarea" value={f.obs} onChange={e=>setF({...f,obs:e.target.value})} rows={2}/>

}

// ── CHEQUEO MASIVO DE PRECIOS ──────────────────────────────────────────────
const PRECIOS_UNIMARES = {
  "Camarón Jumbo x 350g (Cód.24)": 16700,
  "Camarón Hogar x 350g (Cód.22)": 14500,
  "Filete de Salmón Porción x 350g (Cód.8)": 25300,
  "Mixtura Mariscos x 500g (Cód.11)": 12000,
  "Filete de Tilapia x 500g (Cód.21)": 11500,
  "Filete de Tilapia x 1000g (Cód.30)": 22300,
  "Bagre Amazonas x 450g (Cód.28)": 18300,
  "Pescado Seco (Cód.188)": 17200,
};

function ChequeoMasivo({data, setData}) {
  const initPrecios = () => {
    const obj = {};
    PRODS.forEach(p => {
      obj[p] = { _unimares: String(PRECIOS_UNIMARES[p]) };
      COMP.forEach(c => { obj[p][c] = ""; });
    });
    return obj;
  };

  const [merc, setMerc] = useState("");
  const [almacen, setAlmacen] = useState("");
  const [fecha, setFecha] = useState(HOY());
  const [precios, setPrecios] = useState(initPrecios());
  const [abiertos, setAbiertos] = useState({});
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState(null);

  const showToast = (msg, ok) => { setToast({msg,ok}); setTimeout(()=>setToast(null), 3500); };

  const toggleProd = (prod) => setAbiertos(prev => ({...prev, [prod]: !prev[prod]}));

  const setVal = (prod, marca, val) => {
    setPrecios(prev => ({...prev, [prod]: {...prev[prod], [marca]: val}}));
  };

  const pct = (pU, pC) => {
    if (!pC || !pU || isNaN(pC) || isNaN(pU)) return null;
    return Math.round(((Number(pC) - Number(pU)) / Number(pU)) * 100);
  };

  const prodLleno = (prod) => COMP.some(c => precios[prod][c] !== "");

  const save = async () => {
    if (!merc || !almacen) return showToast("Selecciona mercaderista y almacén", false);
    setLoading(true);
    let enviados = 0;
    for (const prod of PRODS) {
      if (!prodLleno(prod)) continue;
      const pU = precios[prod]["_unimares"] || PRECIOS_UNIMARES[prod];
      const campos = {
        Fecha: fecha, Mercaderista: merc, Almacen: almacen, Producto: prod,
        PrecioUnimares: pU,
        RicoMar: precios[prod]["Rico Mar"] || "—",
        CincoSierras: precios[prod]["Cinco Sierras"] || "—",
        Vitamar: precios[prod]["Vitamar"] || "—",
        Antillana: precios[prod]["Antillana"] || "—",
        AnclaYViento: precios[prod]["Ancla y Viento"] || "—",
        MarcaBlanca: precios[prod]["Marca Blanca"] || "—",
        Timestamp: new Date().toISOString()
      };
      await enviarASheets("ChequeoMasivo", campos);
      enviados++;
    }
    setLoading(false);
    if (enviados > 0) {
      setData(prev => [...prev, {merc, almacen, fecha, precios, id: Date.now()}]);
      setPrecios(initPrecios());
      setAbiertos({});
      setMerc(""); setAlmacen("");
      showToast(`✓ ${enviados} productos enviados a Sheets`, true);
    } else {
      showToast("Abre al menos un producto y llena precios", false);
    }
  };

  const totalLlenos = PRODS.filter(p => prodLleno(p)).length;

  return (
    <div>
      {toast && <Toast msg={toast.msg} ok={toast.ok}/>}
      <div style={{background:"linear-gradient(135deg,#7C3AED,#5B21B6)",borderRadius:"24px",padding:"20px",marginBottom:"16px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:"-30px",right:"-30px",width:"120px",height:"120px",background:"rgba(255,255,255,0.07)",borderRadius:"50%"}}/>
        <h2 style={{color:"white",fontWeight:"900",fontSize:"22px",margin:"0 0 4px 0",position:"relative",zIndex:1}}>📊 Chequeo Masivo</h2>
        <p style={{color:"rgba(255,255,255,0.7)",fontSize:"12px",margin:0,position:"relative",zIndex:1}}>Toca cada producto para abrir y llenar precios</p>
      </div>

      {/* Cabecera */}
      <Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"8px"}}>
          <Field label="Mercaderista *" type="select" value={merc} onChange={e=>setMerc(e.target.value)} options={MERCS.map(m=>m.nombre)}/>
          <Field label="Almacén *" type="select" value={almacen} onChange={e=>setAlmacen(e.target.value)} options={ALMACENES}/>
        </div>
        <Field label="Fecha" type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
        {totalLlenos > 0 && (
          <div style={{background:"#EEF2FF",borderRadius:"10px",padding:"8px 12px",textAlign:"center"}}>
            <span style={{fontSize:"12px",fontWeight:"700",color:"#4F46E5"}}>✓ {totalLlenos} de {PRODS.length} productos con datos</span>
          </div>
        )}
      </Card>

      {/* Acordeón de productos */}
      <div style={{marginBottom:"80px"}}>
        {PRODS.map(prod => {
          const abierto = !!abiertos[prod];
          const lleno = prodLleno(prod);
          const pU = precios[prod]["_unimares"];
          const cambiado = pU !== String(PRECIOS_UNIMARES[prod]);

          return (
            <div key={prod} style={{background:"white",borderRadius:"16px",marginBottom:"8px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`2px solid ${lleno?"#C4B5FD":abierto?"#E8EDF8":"#E8EDF8"}`,overflow:"hidden",transition:"all 0.2s"}}>

              {/* Header — siempre visible */}
              <div onClick={()=>toggleProd(prod)}
                style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px",cursor:"pointer",background:abierto?"#FAFAFA":"white"}}>
                <div style={{flex:1}}>
                  <p style={{fontWeight:"800",fontSize:"13px",color:"#0F2167",margin:"0 0 2px 0",lineHeight:"1.3"}}>{prod}</p>
                  <div style={{display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"}}>
                    <span style={{fontSize:"11px",fontWeight:"700",color: cambiado?"#D97706":"#3B6FE8",background: cambiado?"#FEF3C7":"#EEF2FF",padding:"2px 7px",borderRadius:"6px"}}>
                      Unimares: ${Number(pU).toLocaleString()} {cambiado?"✏️":""}
                    </span>
                    {lleno && <span style={{fontSize:"11px",fontWeight:"700",color:"#7C3AED",background:"#EDE9FE",padding:"2px 7px",borderRadius:"6px"}}>✓ con datos</span>}
                  </div>
                </div>
                <span style={{fontSize:"20px",color:"#94A3B8",marginLeft:"8px",transition:"transform 0.2s",transform:abierto?"rotate(180deg)":"rotate(0deg)"}}>▼</span>
              </div>

              {/* Contenido desplegable */}
              {abierto && (
                <div style={{padding:"0 14px 14px",borderTop:"1px solid #F0F4FF"}}>

                  {/* Precio Unimares editable */}
                  <div style={{background:"linear-gradient(135deg,#EEF2FF,#E0E7FF)",borderRadius:"12px",padding:"10px 14px",marginBottom:"12px",marginTop:"12px",border:"2px solid #C7D2FE"}}>
                    <label style={{fontSize:"10px",fontWeight:"800",color:"#3730A3",display:"block",marginBottom:"4px",textTransform:"uppercase",letterSpacing:"0.06em"}}>🐟 Unimares (editable)</label>
                    <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                      <span style={{fontSize:"14px",color:"#4F46E5",fontWeight:"700"}}>$</span>
                      <input
                        type="number"
                        value={pU}
                        onChange={e => setVal(prod, "_unimares", e.target.value)}
                        style={{flex:1,border:"none",background:"transparent",fontSize:"18px",fontWeight:"900",color:"#1E1B4B",outline:"none",fontFamily:"inherit"}}
                      />
                      {cambiado && (
                        <button onClick={()=>setVal(prod,"_unimares",String(PRECIOS_UNIMARES[prod]))}
                          style={{fontSize:"10px",background:"#E0E7FF",border:"none",borderRadius:"6px",padding:"3px 7px",cursor:"pointer",color:"#4338CA",fontWeight:"700"}}>
                          Restablecer
                        </button>
                      )}
                    </div>
                  </div>

                  {/* Competidores */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                    {COMP.map(marca => {
                      const val = precios[prod][marca];
                      const p = pct(pU, val);
                      const masBarato = p !== null && p < 0;
                      const masCaro = p !== null && p > 0;
                      const igual = p === 0;
                      return (
                        <div key={marca} style={{
                          background: masBarato?"#FEF2F2": masCaro?"#F0FDF4": igual?"#FFF7ED":"#F8FAFF",
                          borderRadius:"10px", padding:"10px",
                          border:`1px solid ${masBarato?"#FECACA":masCaro?"#BBF7D0":igual?"#FED7AA":"#E8EDF8"}`
                        }}>
                          <label style={{fontSize:"10px",fontWeight:"800",color: masBarato?"#DC2626":masCaro?"#16A34A":"#6B7B9E",display:"block",marginBottom:"4px",textTransform:"uppercase",letterSpacing:"0.04em"}}>{marca}</label>
                          <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
                            <span style={{fontSize:"13px",color:"#94A3B8",fontWeight:"600"}}>$</span>
                            <input
                              type="number"
                              placeholder="—"
                              value={val}
                              onChange={e => setVal(prod, marca, e.target.value)}
                              style={{flex:1,border:"none",background:"transparent",fontSize:"15px",fontWeight:"800",color:"#1a2240",outline:"none",fontFamily:"inherit",width:"100%"}}
                            />
                          </div>
                          {p !== null && (
                            <div style={{fontSize:"10px",fontWeight:"800",marginTop:"3px",color: masBarato?"#DC2626":masCaro?"#16A34A":"#D97706"}}>
                              {masBarato ? `▼ ${Math.abs(p)}% más barato` : masCaro ? `▲ ${p}% más caro` : `= Mismo precio`}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{position:"sticky",bottom:"80px",zIndex:50,marginBottom:"12px"}}>
        <Btn onClick={save} loading={loading}
          gradient="linear-gradient(135deg,#7C3AED,#5B21B6)"
          shadow="0 4px 20px rgba(124,58,237,0.4)">
          {totalLlenos > 0 ? `Enviar ${totalLlenos} productos → Sheets` : "Enviar Chequeo → Sheets"}
        </Btn>
      </div>

      {/* Historial */}
      {data.length > 0 && (
        <Card>
          <h3 style={{color:"#0F2167",fontWeight:"900",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 12px 0"}}>Últimos chequeos ({data.length})</h3>
          {data.slice(-3).reverse().map(r => (
            <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #F0F4FF"}}>
              <div>
                <p style={{fontWeight:"700",fontSize:"13px",color:"#1a2240",margin:"0 0 2px 0"}}>{r.almacen}</p>
                <p style={{fontSize:"11px",color:"#6B7B9E",margin:0}}>{r.merc} · {r.fecha}</p>
              </div>
              <div style={{background:"#EEF2FF",borderRadius:"8px",padding:"4px 10px"}}>
                <span style={{fontSize:"11px",fontWeight:"700",color:"#4F46E5"}}>{PRODS.filter(p=>COMP.some(c=>r.precios[p][c]!=="")).length} prods</span>
              </div>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}

// ── APP PRINCIPAL ──────────────────────────────────────────────────────────
const TABS = [
  {id:"dash",  i:"📊", l:"Inicio"},
  {id:"asist", i:"🕐", l:"Asistencia"},
  {id:"activ", i:"📸", l:"Actividades"},
  {id:"masivo",i:"📊", l:"Precios"},
  {id:"inv",   i:"📦", l:"Inventario"},
  {id:"aver",  i:"⚠️", l:"Averías"},
];

function App() {
  const [tab, setTab] = useState("dash");
  const [as, setAs] = useState([]);
  const [ac, setAc] = useState([]);
  const [pr, setPr] = useState([]);
  const [cm, setCm] = useState([]);
  const [inv, setInv] = useState([]);
  const [av, setAv] = useState([]);

  return (
    <div style={{minHeight:"100vh",background:"#F0F4FF",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      <div style={{maxWidth:"420px",margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
        <div style={{flex:1,overflowY:"auto",padding:"16px 12px 100px"}}>
          {tab==="dash"   && <Dashboard as={as} ac={ac} pr={pr} inv={inv} av={av}/>}
          {tab==="asist"  && <Asistencia data={as} setData={setAs}/>}
          {tab==="activ"  && <Actividades data={ac} setData={setAc}/>}
          {tab==="masivo" && <ChequeoMasivo data={cm} setData={setCm}/>}
          {tab==="inv"    && <Inventario data={inv} setData={setInv}/>}
          {tab==="aver"   && <Averias data={av} setData={setAv}/>}
        </div>
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(255,255,255,0.97)",backdropFilter:"blur(12px)",borderTop:"1px solid #E8EDF8",padding:"8px 4px",zIndex:100,boxShadow:"0 -4px 20px rgba(0,0,0,0.08)"}}>
          <div style={{display:"flex",justifyContent:"space-around",maxWidth:"420px",margin:"0 auto"}}>
            {TABS.map(t => (
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",padding:"6px 8px",borderRadius:"12px",border:"none",cursor:"pointer",background:tab===t.id?"#EEF2FF":"transparent",transition:"all 0.15s",fontFamily:"inherit"}}>
                <span style={{fontSize:"20px",lineHeight:1}}>{t.i}</span>
                <span style={{fontSize:"10px",fontWeight:"700",color:tab===t.id?"#3B6FE8":"#94A3B8"}}>{t.l}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
