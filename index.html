<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unimares Tracker — Gestión Mercaderistas</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  body { margin: 0; background: #F0F4FF; }
  select, input, textarea { appearance: none; -webkit-appearance: none; font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwoXdIDyKXymb7A9n4RclRU0Wxkl2bUhXHpdV5qCJwEeD-BPSYhsFsyKDeHo2YWiqs7Ug/exec";

// ── CONSTANTES ─────────────────────────────────────────────────────────────
const USUARIOS = [
  {pin:"1001", nombre:"Ruby Gracia",      rol:"mercaderista"},
  {pin:"1002", nombre:"Mercadeo 1",       rol:"mercaderista"},
  {pin:"1003", nombre:"Mercadeo 2",       rol:"mercaderista"},
  {pin:"4313", nombre:"Supervisor / Jefe",rol:"supervisor"},
];

const ALMACENES = ["Éxito Ibagué Centro","Éxito Ibagué Norte","Jumbo Ibagué","Carulla La Estación","Mercacentro No. 10","Olímpica Ibagué","Populares","Surtiplaza La 37","Surtiplaza Acqua","Surtiplaza El Salado"];
const MERCS = [{id:1,nombre:"Ruby Gracia",almacen:"Todos",rol:"Mercaderista"},{id:2,nombre:"Mercadeo 1",almacen:"",rol:"Mercaderista"},{id:3,nombre:"Mercadeo 2",almacen:"",rol:"Mercaderista"},{id:4,nombre:"Supervisor / Jefe",almacen:"Todos",rol:"Supervisor"}];
const PRODS = ["Camarón Jumbo x 350g (Cód.24)","Camarón Hogar x 350g (Cód.22)","Filete de Salmón Porción x 350g (Cód.8)","Mixtura Mariscos x 500g (Cód.11)","Filete de Tilapia x 500g (Cód.21)","Filete de Tilapia x 1000g (Cód.30)","Bagre Amazonas x 450g (Cód.28)","Pescado Seco (Cód.188)"];
const COMP = ["Rico Mar","Cinco Sierras","Vitamar","Antillana","Ancla y Viento","Marca Blanca"];
const PRECIOS_REF = {"Camarón Jumbo x 350g (Cód.24)":16700,"Camarón Hogar x 350g (Cód.22)":14500,"Filete de Salmón Porción x 350g (Cód.8)":25300,"Mixtura Mariscos x 500g (Cód.11)":12000,"Filete de Tilapia x 500g (Cód.21)":11500,"Filete de Tilapia x 1000g (Cód.30)":22300,"Bagre Amazonas x 450g (Cód.28)":18300,"Pescado Seco (Cód.188)":17200};

const HOY = () => new Date().toISOString().split("T")[0];
const HORA = () => new Date().toTimeString().slice(0,5);
const TIMESTAMP = () => {
  const now = new Date();
  const col = new Date(now.getTime() - 5*60*60*1000);
  const d = col.toISOString();
  const fecha = d.slice(8,10)+"/"+d.slice(5,7)+"/"+d.slice(0,4);
  let h = col.getUTCHours();
  const m = String(col.getUTCMinutes()).padStart(2,"0");
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return fecha+" "+String(h).padStart(2,"0")+":"+m+" "+ampm;
};

// ── STORAGE ────────────────────────────────────────────────────────────────
const STORE_KEY = "unimares_v1";
const loadStore = () => { try { const r = localStorage.getItem(STORE_KEY); return r ? JSON.parse(r) : {}; } catch(e) { return {}; } };
// Limpiar sesion invalida (sin rol)
try {
  const s = loadStore();
  if (s.session && !s.session.rol) { s.session = null; localStorage.setItem(STORE_KEY, JSON.stringify(s)); }
} catch(e) {}
const saveStore = (k, v) => { try { const s = loadStore(); s[k]=v; localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch(e) {} };
function usePersistedState(key, def) {
  const [val, setVal] = useState(() => { const s = loadStore(); return s[key] !== undefined ? s[key] : def; });
  useEffect(() => { saveStore(key, val); }, [val]);
  return [val, setVal];
}

// ── ENVIAR A SHEETS ────────────────────────────────────────────────────────
async function enviarASheets(modulo, campos) {
  try {
    await fetch(SCRIPT_URL, { method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"}, body:JSON.stringify({modulo, campos}) });
    return true;
  } catch(e) { return false; }
}

// ── COMPONENTES BASE ───────────────────────────────────────────────────────
function Field({label, type="text", value, onChange, options, rows=3}) {
  const css = {background:"#F0F4FF",border:"none",borderRadius:"12px",padding:"10px 14px",fontSize:"14px",width:"100%",outline:"none",color:"#1a2240",fontFamily:"inherit"};
  return (
    <div style={{marginBottom:"12px"}}>
      <label style={{fontSize:"11px",fontWeight:"700",color:"#6B7B9E",display:"block",marginBottom:"4px",textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</label>
      {type==="select" ? (
        <select value={value} onChange={onChange} style={css}>
          <option value="">-- Seleccionar --</option>
          {(options||[]).map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      ) : type==="textarea" ? (
        <textarea value={value} onChange={onChange} rows={rows} style={{...css,resize:"vertical"}}/>
      ) : (
        <input type={type} value={value} onChange={onChange} style={css}/>
      )}
    </div>
  );
}
function Tag({color, children}) {
  const colors = {green:["#DCFCE7","#16A34A"],red:["#FEE2E2","#DC2626"],blue:["#DBEAFE","#1D4ED8"],orange:["#FEF3C7","#D97706"],purple:["#EDE9FE","#7C3AED"]};
  const [bg,fg] = colors[color]||colors.blue;
  return <span style={{background:bg,color:fg,fontWeight:"700",fontSize:"11px",padding:"3px 8px",borderRadius:"6px"}}>{children}</span>;
}
function Btn({children, onClick, loading, gradient, shadow}) {
  return (
    <button onClick={onClick} disabled={loading} style={{width:"100%",padding:"14px",borderRadius:"16px",border:"none",cursor:"pointer",fontWeight:"800",fontSize:"15px",color:"white",background:gradient||"linear-gradient(135deg,#3B6FE8,#2952C0)",boxShadow:shadow||"0 4px 15px rgba(59,111,232,0.4)",fontFamily:"inherit",transition:"opacity 0.2s",opacity:loading?0.7:1}}>
      {loading ? "⏳ Guardando en Sheets..." : children}
    </button>
  );
}
function Card({children}) {
  return <div style={{background:"white",borderRadius:"20px",padding:"16px",marginBottom:"12px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:"1px solid #E8EDF8"}}>{children}</div>;
}
function SectionHead({icon, title, subtitle, gradient}) {
  return (
    <div style={{background:gradient||"linear-gradient(135deg,#3B6FE8,#2952C0)",borderRadius:"24px",padding:"20px",marginBottom:"16px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:"-30px",right:"-30px",width:"120px",height:"120px",background:"rgba(255,255,255,0.07)",borderRadius:"50%"}}/>
      <h2 style={{color:"white",fontWeight:"900",fontSize:"22px",margin:"0 0 4px 0",position:"relative",zIndex:1}}>{icon} {title}</h2>
      <p style={{color:"rgba(255,255,255,0.7)",fontSize:"12px",margin:0,position:"relative",zIndex:1}}>{subtitle}</p>
    </div>
  );
}
function Checkbox({label, checked, onChange}) {
  return (
    <div onClick={onChange} style={{display:"flex",alignItems:"center",gap:"10px",cursor:"pointer",padding:"8px 0"}}>
      <div style={{width:"22px",height:"22px",borderRadius:"6px",border:"2px solid",borderColor:checked?"#3B6FE8":"#CBD5E1",background:checked?"#3B6FE8":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"}}>
        {checked && <span style={{color:"white",fontSize:"14px",fontWeight:"900"}}>✓</span>}
      </div>
      <span style={{fontSize:"14px",color:"#1a2240",fontWeight:checked?"700":"400"}}>{label}</span>
    </div>
  );
}
function Toast({msg, ok}) {
  return (
    <div style={{position:"fixed",top:"80px",left:"50%",transform:"translateX(-50%)",zIndex:999,background:ok?"#DCFCE7":"#FEE2E2",border:`1px solid ${ok?"#86EFAC":"#FCA5A5"}`,borderRadius:"14px",padding:"12px 20px",boxShadow:"0 4px 20px rgba(0,0,0,0.15)",whiteSpace:"nowrap"}}>
      <span style={{fontWeight:"700",fontSize:"13px",color:ok?"#16A34A":"#DC2626"}}>{msg}</span>
    </div>
  );
}
function StatCard({icon, value, label, gradient}) {
  return (
    <div style={{background:gradient||"linear-gradient(135deg,#3B6FE8,#2952C0)",borderRadius:"16px",padding:"14px",textAlign:"center"}}>
      <div style={{fontSize:"24px",marginBottom:"4px"}}>{icon}</div>
      <div style={{color:"white",fontWeight:"900",fontSize:"26px",lineHeight:1}}>{value}</div>
      <div style={{color:"rgba(255,255,255,0.8)",fontSize:"11px",marginTop:"4px",fontWeight:"600"}}>{label}</div>
    </div>
  );
}

// ── LOGIN ──────────────────────────────────────────────────────────────────
function Login({onLogin}) {
  const [pin, setPin] = useState("");
  const [error, setError] = useState(false);
  const [shake, setShake] = useState(false);

  const tryPin = (p) => {
    const user = USUARIOS.find(u => u.pin === p);
    if (user) {
      onLogin(user);
    } else {
      setShake(true); setError(true);
      setTimeout(() => { setShake(false); setError(false); setPin(""); }, 900);
    }
  };
  const press = (val) => {
    if (val === "DEL") { setPin(p => p.slice(0,-1)); return; }
    const next = pin + val;
    setPin(next);
    if (next.length === 4) setTimeout(() => tryPin(next), 150);
  };
  const KEYS = ["1","2","3","4","5","6","7","8","9","","0","DEL"];

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0F2167,#1a3a8f,#0F2167)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      <img src="https://lobomarketer-byte.github.io/unimares-tracker/logo10.png" alt="Unimares" style={{height:"60px",objectFit:"contain",marginBottom:"8px"}}/>
      <p style={{color:"rgba(255,255,255,0.6)",fontSize:"12px",marginBottom:"36px",fontWeight:"600",letterSpacing:"0.05em"}}>GESTIÓN DE MERCADERISTAS</p>
      <div style={{display:"flex",gap:"16px",marginBottom:"32px"}}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{width:"16px",height:"16px",borderRadius:"50%",background:pin.length>i?(error?"#EF4444":"#38BDF8"):"rgba(255,255,255,0.2)",border:"2px solid "+(pin.length>i?(error?"#EF4444":"#38BDF8"):"rgba(255,255,255,0.3)"),transition:"all 0.15s"}}/>
        ))}
      </div>
      {error && <p style={{color:"#FCA5A5",fontSize:"13px",fontWeight:"700",marginBottom:"16px",marginTop:"-16px"}}>PIN incorrecto</p>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,72px)",gap:"12px"}}>
        {KEYS.map((k,i) => (
          k==="" ? <div key={i}/> :
          <button key={i} onClick={() => press(k)}
            style={{width:"72px",height:"72px",borderRadius:"50%",background:k==="DEL"?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.15)",color:"white",fontSize:k==="DEL"?"18px":"24px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit",transition:"all 0.1s"}}>
            {k==="DEL" ? "X" : k}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function Dashboard({as, ac, pr, inv, av, limpiar}) {
  const h = HOY();
  const alertas = inv.filter(r => r.stockMin && Number(r.stock) <= Number(r.stockMin));
  const presHoy = as.filter(r => r.fecha===h).length;
  const actHoy  = ac.filter(r => r.fecha===h).length;
  const invHoy  = inv.filter(r => r.fecha===h).length;
  const precHoy = pr.filter(r => r.fecha===h).length;
  const totalMercs = MERCS.filter(m => m.rol==="Mercaderista").length;

  const ultimos7 = Array.from({length:7}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()-6+i);
    const key = d.toISOString().split("T")[0];
    const dias = ["Do","Lu","Ma","Mi","Ju","Vi","Sa"];
    return {l:dias[d.getDay()], v:ac.filter(r=>r.fecha===key).length};
  });
  const maxV = Math.max(...ultimos7.map(d=>d.v), 1);

  return (
    <div>
      <div style={{background:"linear-gradient(135deg,#0F2167,#1a3a8f)",borderRadius:"24px",padding:"20px",marginBottom:"16px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:"-32px",right:"-32px",width:"128px",height:"128px",background:"rgba(255,255,255,0.06)",borderRadius:"50%"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",position:"relative",zIndex:1}}>
          <div>
            <img src="https://lobomarketer-byte.github.io/unimares-tracker/logo10.png" alt="Unimares" style={{height:"40px",objectFit:"contain",maxWidth:"160px",marginBottom:"4px"}}/>
            <p style={{color:"#93C5FD",fontSize:"12px",margin:"0 0 2px 0",fontWeight:"500"}}>Gestión Mercaderistas · Ibagué</p>
            <p style={{color:"#60A5FA",fontSize:"11px",margin:0}}>{new Date().toLocaleDateString("es-CO",{weekday:"long",day:"numeric",month:"long"})}</p>
          </div>
          <div style={{background:"rgba(255,255,255,0.12)",borderRadius:"14px",padding:"10px 16px",textAlign:"center"}}>
            <div style={{color:"white",fontWeight:"900",fontSize:"28px",lineHeight:1}}>{presHoy}</div>
            <div style={{color:"#93C5FD",fontSize:"10px",fontWeight:"600",marginTop:"2px"}}>presentes</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginTop:"16px",position:"relative",zIndex:1}}>
          {[["📸",actHoy,"Actividades"],["🏷️",precHoy,"Precios"],["⚠️",av.filter(r=>r.fecha===h).length,"Averías"]].map(([ic,v,l]) =>
            <div key={l} style={{background:"rgba(255,255,255,0.12)",borderRadius:"12px",padding:"10px",textAlign:"center"}}>
              <div style={{fontSize:"20px"}}>{ic}</div>
              <div style={{color:"white",fontWeight:"900",fontSize:"22px",lineHeight:1}}>{v}</div>
              <div style={{color:"rgba(255,255,255,0.7)",fontSize:"10px",marginTop:"2px"}}>{l}</div>
            </div>
          )}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"12px"}}>
        <StatCard icon="🕐" value={presHoy+"/"+totalMercs} label="Asistencia hoy" gradient="linear-gradient(135deg,#3B6FE8,#2952C0)"/>
        <StatCard icon="📦" value={invHoy} label="Inventarios hoy" gradient="linear-gradient(135deg,#6366F1,#4F46E5)"/>
        <StatCard icon="🔔" value={alertas.length} label="Alertas stock" gradient={alertas.length>0?"linear-gradient(135deg,#EF4444,#DC2626)":"linear-gradient(135deg,#0D9488,#0F766E)"}/>
        <StatCard icon="📊" value={ac.length} label="Total actividades" gradient="linear-gradient(135deg,#F97316,#EA580C)"/>
      </div>

      <Card>
        <h3 style={{color:"#0F2167",fontWeight:"900",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 14px 0"}}>📈 Actividades — Últimos 7 días</h3>
        <div style={{display:"flex",alignItems:"flex-end",gap:"6px",height:"80px",padding:"0 4px"}}>
          {ultimos7.map((d,i) => (
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}>
              <span style={{fontSize:"10px",fontWeight:"900",color:"#0F2167"}}>{d.v||""}</span>
              <div style={{width:"100%",background:d.v>0?"#3B6FE8":"#E8EDF8",borderRadius:"6px 6px 0 0",height:d.v>0?Math.max((d.v/maxV)*50,6)+"px":"6px"}}/>
              <span style={{fontSize:"9px",color:"#94A3B8",fontWeight:"600"}}>{d.l}</span>
            </div>
          ))}
        </div>
      </Card>

      <Card>
        <h3 style={{color:"#0F2167",fontWeight:"900",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 12px 0"}}>👥 Equipo Hoy</h3>
        {MERCS.map(m => {
          const a = as.find(r => r.merc===m.nombre && r.fecha===h);
          const nA = ac.filter(r => r.merc===m.nombre && r.fecha===h).length;
          const nP = pr.filter(r => r.merc===m.nombre && r.fecha===h).length;
          const nI = inv.filter(r => r.merc===m.nombre && r.fecha===h).length;
          return (
            <div key={m.id} style={{padding:"10px 0",borderBottom:"1px solid #F0F4FF"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
                <p style={{fontWeight:"800",fontSize:"13px",color:"#1a2240",margin:0}}>{m.nombre}</p>
                <Tag color={a?"green":"red"}>{a?"Presente":"Ausente"}</Tag>
              </div>
              <div style={{display:"flex",gap:"6px"}}>
                {[["📸",nA,"act"],["🏷️",nP,"prec"],["📦",nI,"inv"]].map(([ic,val,lb]) => (
                  <div key={lb} style={{background:val>0?"#EEF2FF":"#F8FAFF",borderRadius:"8px",padding:"3px 8px",display:"flex",gap:"4px",alignItems:"center"}}>
                    <span style={{fontSize:"11px"}}>{ic}</span>
                    <span style={{fontSize:"11px",fontWeight:"800",color:val>0?"#3B6FE8":"#CBD5E1"}}>{val}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </Card>

      {alertas.length > 0 && (
        <div style={{background:"#FFF7ED",border:"2px solid #FED7AA",borderRadius:"16px",padding:"16px",marginBottom:"12px"}}>
          <p style={{color:"#9A3412",fontWeight:"900",fontSize:"13px",margin:"0 0 10px 0"}}>🔔 Alertas de Stock Bajo</p>
          {alertas.map(r => (
            <div key={r.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid rgba(254,215,170,0.5)"}}>
              <span style={{fontSize:"12px",color:"#C2410C",fontWeight:"500"}}>{r.prod} · {r.almacen}</span>
              <span style={{fontSize:"12px",fontWeight:"900",color:"#991B1B"}}>{r.stock}/{r.stockMin}</span>
            </div>
          ))}
        </div>
      )}

      <Card>
        <h3 style={{color:"#0F2167",fontWeight:"900",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 12px 0"}}>📦 Acumulado Total</h3>
        {[["Asistencias",as.length,"#3B6FE8"],["Actividades",ac.length,"#F97316"],["Chequeos precio",pr.length,"#0D9488"],["Inventarios",inv.length,"#6366F1"],["Averias",av.length,"#EF4444"]].map(([l,v,c]) => (
          <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #F0F4FF"}}>
            <span style={{fontSize:"13px",color:"#475569"}}>{l}</span>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <div style={{width:"60px",height:"6px",background:"#F0F4FF",borderRadius:"3px",overflow:"hidden"}}>
                <div style={{width:Math.min((v/Math.max(as.length,1))*100,100)+"%",height:"100%",background:c,borderRadius:"3px"}}/>
              </div>
              <span style={{fontWeight:"900",color:"#0F2167",fontSize:"14px",minWidth:"20px",textAlign:"right"}}>{v}</span>
            </div>
          </div>
        ))}
      </Card>

      <div style={{textAlign:"center",paddingBottom:"8px"}}>
        <button onClick={limpiar} style={{background:"none",border:"1px solid #E2E8F0",borderRadius:"10px",padding:"8px 20px",fontSize:"11px",color:"#94A3B8",cursor:"pointer",fontFamily:"inherit",fontWeight:"600"}}>
          Limpiar registros de dias anteriores
        </button>
      </div>
    </div>
  );
}

// ── ASISTENCIA ─────────────────────────────────────────────────────────────
function Asistencia({data, setData}) {
  const [merc, setMerc] = useState("");
  const [almacen, setAlmacen] = useState("");
  const [fecha, setFecha] = useState(HOY());
  const [horaE, setHoraE] = useState(HORA());
  const [horaS, setHoraS] = useState("");
  const [firma, setFirma] = useState("");
  const [obs, setObs] = useState("");
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState(null);
  const showToast = (msg, ok) => { setToast({msg,ok}); setTimeout(()=>setToast(null),3500); };

  const save = async () => {
    if (!merc || !almacen) return showToast("Completa mercaderista y almacén", false);
    setLoading(true);
    const campos = {Fecha:fecha, Mercaderista:merc, Almacen:almacen, HoraEntrada:horaE, HoraSalida:horaS, Firma:firma, Observaciones:obs, Timestamp:TIMESTAMP()};
    const ok = await enviarASheets("Asistencia", campos);
    setLoading(false);
    if (ok) { setData(prev => [...prev, {...campos, id:Date.now()}]); setFirma(""); setObs(""); setHoraS(""); showToast("Asistencia guardada", true); }
    else showToast("Error al guardar", false);
  };

  return (
    <div>
      {toast && <Toast msg={toast.msg} ok={toast.ok}/>}
      <SectionHead icon="🕐" title="Asistencia" subtitle="Registro de entrada y salida" gradient="linear-gradient(135deg,#3B6FE8,#2952C0)"/>
      <Card>
        <Field label="Mercaderista *" type="select" value={merc} onChange={e=>setMerc(e.target.value)} options={MERCS.map(m=>m.nombre)}/>
        <Field label="Almacén *" type="select" value={almacen} onChange={e=>setAlmacen(e.target.value)} options={ALMACENES}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
          <Field label="Fecha" type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
          <Field label="Hora Entrada" type="time" value={horaE} onChange={e=>setHoraE(e.target.value)}/>
        </div>

// ── PRECIOS (CHEQUEO MASIVO) ───────────────────────────────────────────────
function Precios({data, setData}) {
  const initP = () => {
    const obj = {};
    PRODS.forEach(p => { obj[p] = {_u: String(PRECIOS_REF[p])}; COMP.forEach(c => { obj[p][c]=""; }); });
    return obj;
  };
  const [merc, setMerc] = useState(""); const [almacen, setAlmacen] = useState(""); const [fecha, setFecha] = useState(HOY());
  const [precios, setPrecios] = useState(initP()); const [abiertos, setAbiertos] = useState({});
  const [loading, setLoading] = useState(false); const [toast, setToast] = useState(null);
  const showToast = (msg, ok) => { setToast({msg,ok}); setTimeout(()=>setToast(null),3500); };
  const toggle = (p) => setAbiertos(prev=>({...prev,[p]:!prev[p]}));
  const setVal = (p, m, v) => setPrecios(prev=>({...prev,[p]:{...prev[p],[m]:v}}));
  const pct = (pU, pC) => { if (!pC||!pU||isNaN(pC)||isNaN(pU)) return null; return Math.round(((Number(pC)-Number(pU))/Number(pU))*100); };
  const lleno = (p) => COMP.some(c => precios[p][c]!=="");
  const totalLlenos = PRODS.filter(p=>lleno(p)).length;

  const save = async () => {
    if (!merc||!almacen) return showToast("Selecciona mercaderista y almacén", false);
    setLoading(true);
    let enviados = 0;
    for (const prod of PRODS) {
      if (!lleno(prod)) continue;
      const pU = precios[prod]["_u"] || PRECIOS_REF[prod];
      const campos = {Fecha:fecha, Mercaderista:merc, Almacen:almacen, Producto:prod, PrecioUnimares:pU,
        RicoMar:precios[prod]["Rico Mar"]||"—", CincoSierras:precios[prod]["Cinco Sierras"]||"—",
        Vitamar:precios[prod]["Vitamar"]||"—", Antillana:precios[prod]["Antillana"]||"—",
        AnclaYViento:precios[prod]["Ancla y Viento"]||"—", MarcaBlanca:precios[prod]["Marca Blanca"]||"—",
        Timestamp:TIMESTAMP()};
      await enviarASheets("ChequeoMasivo", campos);
      enviados++;
    }
    setLoading(false);
    if (enviados>0) { setData(prev=>[...prev,{merc,almacen,fecha,precios,id:Date.now()}]); setPrecios(initP()); setAbiertos({}); setMerc(""); setAlmacen(""); showToast(enviados+" productos enviados", true); }
    else showToast("Abre al menos un producto", false);
  };

  return (
    <div>
      {toast && <Toast msg={toast.msg} ok={toast.ok}/>}
      <SectionHead icon="🏷️" title="Chequeo Masivo" subtitle="Toca cada producto para abrir y llenar precios" gradient="linear-gradient(135deg,#7C3AED,#5B21B6)"/>
      <Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"8px"}}>
          <Field label="Mercaderista *" type="select" value={merc} onChange={e=>setMerc(e.target.value)} options={MERCS.map(m=>m.nombre)}/>
          <Field label="Almacén *" type="select" value={almacen} onChange={e=>setAlmacen(e.target.value)} options={ALMACENES}/>
        </div>
        <Field label="Fecha" type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
        {totalLlenos>0 && <div style={{background:"#EEF2FF",borderRadius:"10px",padding:"8px 12px",textAlign:"center"}}><span style={{fontSize:"12px",fontWeight:"700",color:"#4F46E5"}}>{totalLlenos} de {PRODS.length} productos con datos</span></div>}
      </Card>

      <div style={{marginBottom:"80px"}}>
        {PRODS.map(prod => {
          const ab = !!abiertos[prod]; const ll = lleno(prod); const pU = precios[prod]["_u"];
          const cambiado = pU !== String(PRECIOS_REF[prod]);
          return (
            <div key={prod} style={{background:"white",borderRadius:"16px",marginBottom:"8px",border:"2px solid "+(ll?"#C4B5FD":ab?"#E8EDF8":"#E8EDF8"),overflow:"hidden"}}>
              <div onClick={()=>toggle(prod)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px",cursor:"pointer",background:ab?"#FAFAFA":"white"}}>
                <div style={{flex:1}}>
                  <p style={{fontWeight:"800",fontSize:"13px",color:"#0F2167",margin:"0 0 2px 0",lineHeight:"1.3"}}>{prod}</p>
                  <div style={{display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"}}>
                    <span style={{fontSize:"11px",fontWeight:"700",color:cambiado?"#D97706":"#3B6FE8",background:cambiado?"#FEF3C7":"#EEF2FF",padding:"2px 7px",borderRadius:"6px"}}>Unimares: ${Number(pU).toLocaleString()}{cambiado?" (editado)":""}</span>
                    {ll && <span style={{fontSize:"11px",fontWeight:"700",color:"#7C3AED",background:"#EDE9FE",padding:"2px 7px",borderRadius:"6px"}}>con datos</span>}
                  </div>
                </div>
                <span style={{fontSize:"18px",color:"#94A3B8",marginLeft:"8px"}}>{ab?"v":">"}</span>
              </div>
              {ab && (
                <div style={{padding:"0 14px 14px",borderTop:"1px solid #F0F4FF"}}>
                  <div style={{background:"linear-gradient(135deg,#EEF2FF,#E0E7FF)",borderRadius:"12px",padding:"10px 14px",marginBottom:"12px",marginTop:"12px",border:"2px solid #C7D2FE"}}>
                    <label style={{fontSize:"10px",fontWeight:"800",color:"#3730A3",display:"block",marginBottom:"4px",textTransform:"uppercase"}}>Unimares (editable)</label>
                    <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                      <span style={{fontSize:"14px",color:"#4F46E5",fontWeight:"700"}}>$</span>
                      <input type="number" value={pU} onChange={e=>setVal(prod,"_u",e.target.value)} style={{flex:1,border:"none",background:"transparent",fontSize:"18px",fontWeight:"900",color:"#1E1B4B",outline:"none",fontFamily:"inherit"}}/>
                      {cambiado && <button onClick={()=>setVal(prod,"_u",String(PRECIOS_REF[prod]))} style={{fontSize:"10px",background:"#E0E7FF",border:"none",borderRadius:"6px",padding:"3px 7px",cursor:"pointer",color:"#4338CA",fontWeight:"700"}}>Restablecer</button>}
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                    {COMP.map(marca => {
                      const val = precios[prod][marca]; const p = pct(pU, val);
                      const masBarato = p!==null&&p<0; const masCaro = p!==null&&p>0;
                      return (
                        <div key={marca} style={{background:masBarato?"#FEF2F2":masCaro?"#F0FDF4":"#F8FAFF",borderRadius:"10px",padding:"10px",border:"1px solid "+(masBarato?"#FECACA":masCaro?"#BBF7D0":"#E8EDF8")}}>
                          <label style={{fontSize:"10px",fontWeight:"800",color:masBarato?"#DC2626":masCaro?"#16A34A":"#6B7B9E",display:"block",marginBottom:"4px",textTransform:"uppercase"}}>{marca}</label>
                          <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
                            <span style={{fontSize:"13px",color:"#94A3B8",fontWeight:"600"}}>$</span>
                            <input type="number" placeholder="--" value={val} onChange={e=>setVal(prod,marca,e.target.value)} style={{flex:1,border:"none",background:"transparent",fontSize:"15px",fontWeight:"800",color:"#1a2240",outline:"none",fontFamily:"inherit",width:"100%"}}/>
                          </div>
                          {p!==null && <div style={{fontSize:"10px",fontWeight:"800",marginTop:"3px",color:masBarato?"#DC2626":masCaro?"#16A34A":"#D97706"}}>{masBarato?"▼ "+Math.abs(p)+"% mas barato":masCaro?"▲ "+p+"% mas caro":"= Mismo precio"}</div>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{position:"sticky",bottom:"80px",zIndex:50,marginBottom:"12px"}}>
        <Btn onClick={save} loading={loading} gradient="linear-gradient(135deg,#7C3AED,#5B21B6)" shadow="0 4px 20px rgba(124,58,237,0.4)">
          {totalLlenos>0?"Enviar "+totalLlenos+" productos a Sheets":"Enviar Chequeo a Sheets"}
        </Btn>
      </div>

      {data.length>0 && (
        <Card>
          <h3 style={{color:"#0F2167",fontWeight:"900",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 12px 0"}}>Ultimos chequeos ({data.length})</h3>
          {data.slice(-3).reverse().map(r => (
            <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #F0F4FF"}}>
              <div><p style={{fontWeight:"700",fontSize:"13px",color:"#1a2240",margin:"0 0 2px 0"}}>{r.almacen}</p><p style={{fontSize:"11px",color:"#6B7B9E",margin:0}}>{r.merc} · {r.fecha}</p></div>
              <div style={{background:"#EEF2FF",borderRadius:"8px",padding:"4px 10px"}}><span style={{fontSize:"11px",fontWeight:"700",color:"#4F46E5"}}>{PRODS.filter(p=>COMP.some(c=>r.precios[p][c]!=="")).length} prods</span></div>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}

// ── SUPERVISOR ─────────────────────────────────────────────────────────────
function Supervisor() {
  const [fecha, setFecha] = useState(HOY());
  const [resumen, setResumen] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const cargar = () => {
    setLoading(true); setError(null); setResumen(null);
    const url = SCRIPT_URL + "?fecha=" + fecha;
    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(json) {
        setLoading(false);
        if (json && json.status === "ok") setResumen(json.resumen);
        else setError((json && json.msg) || "Error al leer Sheets");
      })
      .catch(function(err) {
        setLoading(false);
        setError("No se pudo conectar: " + err.message);
      });
  };

  useEffect(function() { cargar(); }, [fecha]);

  const HOJAS = ["Asistencia","Actividades","ChequeoMasivo","Inventario","Averias"];
  const EMOJIS = {Asistencia:"🕐",Actividades:"📸",ChequeoMasivo:"🏷️",Inventario:"📦",Averias:"⚠️"};
  const totalHoy = resumen ? Object.keys(resumen).length : 0;
  const totalRegs = resumen ? Object.values(resumen).reduce((a,m) => a + Object.values(m).reduce((b,v)=>b+v,0),0) : 0;

  return (
    <div>
      <SectionHead icon="👔" title="Supervisor" subtitle="Vista en tiempo real del equipo" gradient="linear-gradient(135deg,#0F766E,#0D9488)"/>
      <Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:"10px",alignItems:"flex-end"}}>
          <Field label="Fecha" type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
          <button onClick={cargar} disabled={loading} style={{background:"linear-gradient(135deg,#0F766E,#0D9488)",color:"white",border:"none",borderRadius:"12px",padding:"10px 16px",fontWeight:"800",fontSize:"13px",cursor:"pointer",fontFamily:"inherit",marginBottom:"12px"}}>
            {loading ? "..." : "Actualizar"}
          </button>
        </div>
        {resumen && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
            <div style={{background:"#CCFBF1",borderRadius:"10px",padding:"8px",textAlign:"center"}}>
              <p style={{fontSize:"22px",fontWeight:"900",color:"#0F766E",margin:0}}>{totalHoy}</p>
              <p style={{fontSize:"10px",color:"#0D9488",fontWeight:"700",margin:0}}>Activos hoy</p>
            </div>
            <div style={{background:"#DBEAFE",borderRadius:"10px",padding:"8px",textAlign:"center"}}>
              <p style={{fontSize:"22px",fontWeight:"900",color:"#1E40AF",margin:0}}>{totalRegs}</p>
              <p style={{fontSize:"10px",color:"#2563EB",fontWeight:"700",margin:0}}>Total registros</p>
            </div>
          </div>
        )}
      </Card>

      {error && <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:"14px",padding:"14px",marginBottom:"12px",textAlign:"center"}}><p style={{color:"#DC2626",fontWeight:"700",fontSize:"13px",margin:0}}>Error: {error}</p></div>}
      {loading && <div style={{background:"white",borderRadius:"16px",padding:"30px",textAlign:"center"}}><p style={{fontSize:"28px",margin:"0 0 8px"}}>⏳</p><p style={{color:"#6B7B9E",fontSize:"13px",fontWeight:"600",margin:0}}>Consultando Google Sheets...</p></div>}

      {resumen && !loading && MERCS.map(m => {
        const datos = resumen[m.nombre] || {};
        const tieneAlgo = Object.keys(datos).length > 0;
        const total = Object.values(datos).reduce((a,v)=>a+v,0);
        return (
          <div key={m.id} style={{background:"white",borderRadius:"14px",padding:"12px",marginBottom:"8px",border:"2px solid "+(tieneAlgo?"#A7F3D0":"#FEE2E2")}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:tieneAlgo?"8px":"0"}}>
              <div>
                <p style={{fontWeight:"800",fontSize:"13px",color:"#0F2167",margin:"0 0 2px 0"}}>{m.nombre}</p>
                <p style={{fontSize:"11px",color:tieneAlgo?"#0D9488":"#EF4444",margin:0,fontWeight:"700"}}>{tieneAlgo?total+" registros":"Sin actividad hoy"}</p>
              </div>
            </div>
            {tieneAlgo && (
              <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                {HOJAS.map(h => {
                  const cant = datos[h] || 0;
                  if (!cant) return null;
                  return (
                    <div key={h} style={{background:"#EEF2FF",borderRadius:"8px",padding:"3px 8px",display:"flex",gap:"4px",alignItems:"center"}}>
                      <span style={{fontSize:"11px"}}>{EMOJIS[h]}</span>
                      <span style={{fontSize:"11px",fontWeight:"800",color:"#3B6FE8"}}>{cant}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}

      {resumen && !loading && Object.keys(resumen).length === 0 && (
        <div style={{background:"white",borderRadius:"16px",padding:"30px",textAlign:"center"}}>
          <p style={{fontSize:"32px",margin:"0 0 8px"}}>📭</p>
          <p style={{color:"#1a2240",fontWeight:"800",fontSize:"14px",margin:"0 0 4px"}}>Sin registros para esta fecha</p>
          <p style={{color:"#94A3B8",fontSize:"12px",margin:0}}>El equipo aun no ha subido actividades</p>
        </div>
      )}

      {resumen && !loading && Object.keys(resumen).length > 0 && (
        <div style={{marginTop:"16px"}}>
          <button onClick={() => exportarPDF(resumen, fecha)}
            style={{width:"100%",padding:"14px",borderRadius:"16px",border:"none",cursor:"pointer",fontWeight:"800",fontSize:"15px",color:"white",background:"linear-gradient(135deg,#0F2167,#1a3a8f)",boxShadow:"0 4px 15px rgba(15,33,103,0.4)",fontFamily:"inherit"}}>
            Exportar Reporte PDF
          </button>
        </div>
      )}
    </div>
  );
}

function exportarPDF(resumen, fecha) {
  const HOJAS = ["Asistencia","Actividades","ChequeoMasivo","Inventario","Averias"];
  const EMOJIS = {Asistencia:"Asistencia",Actividades:"Actividades",ChequeoMasivo:"Precios",Inventario:"Inventario",Averias:"Averias"};
  const totalRegs = Object.values(resumen).reduce((a,m)=>a+Object.values(m).reduce((b,v)=>b+v,0),0);
  const activos = Object.keys(resumen).length;

  const filas = MERCS.map(m => {
    const datos = resumen[m.nombre] || {};
    const total = Object.values(datos).reduce((a,v)=>a+v,0);
    const celdas = HOJAS.map(h => {
      const v = datos[h] || 0;
      return "<td style='text-align:center;padding:8px;border:1px solid #E2E8F0;color:"+(v>0?"#16A34A":"#CBD5E1")+";font-weight:700'>"+( v>0?v:"—")+"</td>";
    }).join("");
    return "<tr><td style='padding:8px 12px;border:1px solid #E2E8F0;font-weight:700;color:#0F2167'>"+m.nombre+"</td>"+celdas+"<td style='text-align:center;padding:8px;border:1px solid #E2E8F0;font-weight:900;color:#0F2167'>"+total+"</td></tr>";
  }).join("");

  const html = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Reporte Unimares - ${fecha}</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; color: #1a2240; }
  .header { background: linear-gradient(135deg,#0F2167,#1a3a8f); color: white; padding: 24px; border-radius: 12px; margin-bottom: 24px; }
  .header h1 { margin: 0 0 4px; font-size: 24px; }
  .header p { margin: 0; opacity: 0.8; font-size: 13px; }
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
  .stat { background: #F0F4FF; border-radius: 10px; padding: 14px; text-align: center; border: 1px solid #E2E8F0; }
  .stat .val { font-size: 28px; font-weight: 900; color: #0F2167; }
  .stat .lbl { font-size: 11px; color: #6B7B9E; font-weight: 600; margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
  th { background: #0F2167; color: white; padding: 10px 8px; text-align: center; font-size: 12px; }
  th:first-child { text-align: left; padding-left: 12px; }
  tr:nth-child(even) td { background: #F8FAFF; }
  .footer { text-align: center; color: #94A3B8; font-size: 11px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #E2E8F0; }
  @media print { body { padding: 0; } }
</style>
</head>
<body>
  <div class="header">
    <h1>UNIMARES — Reporte del Dia</h1>
    <p>Fecha: ${fecha} &nbsp;|&nbsp; Generado: ${new Date().toLocaleString("es-CO")}</p>
    <p>Gestion de Mercaderistas · Ibague, Colombia</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="val">${activos}</div><div class="lbl">Mercaderistas activos</div></div>
    <div class="stat"><div class="val">${totalRegs}</div><div class="lbl">Total registros</div></div>
    <div class="stat"><div class="val">${MERCS.length}</div><div class="lbl">Equipo total</div></div>
  </div>
  <table>
    <thead>
      <tr>
        <th style='text-align:left;padding-left:12px'>Mercaderista</th>
        <th>Asistencia</th><th>Actividades</th><th>Precios</th><th>Inventario</th><th>Averias</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody>${filas}</tbody>
  </table>
  <div class="footer">
    <p>Unimares — Unico, saludable y natural &nbsp;|&nbsp; Ibague, Colombia</p>
    <p>Reporte generado automaticamente desde Unimares Tracker</p>
  </div>
  <scr" + "ipt>window.onload = function(){ window.print(); }</scr" + "ipt>
</body>
</html>`;

  const blob = new Blob([html], {type:"text/html"});
  const url = URL.createObjectURL(blob);
  const win = window.open(url, "_blank");
  if (!win) alert("Permite ventanas emergentes para exportar el PDF");
}

// ── TABS ───────────────────────────────────────────────────────────────────
const TABS = [
  {id:"dash",  i:"🏠", l:"Inicio"},
  {id:"asist", i:"🕐", l:"Asistencia"},
  {id:"activ", i:"📸", l:"Actividades"},
  {id:"prec",  i:"🏷️", l:"Precios"},
  {id:"inv",   i:"📦", l:"Inventario"},
  {id:"aver",  i:"⚠️", l:"Averias"},
  {id:"super", i:"👔", l:"Supervisor"},
];

// ── APP ────────────────────────────────────────────────────────────────────
function App() {
  const [usuario, setUsuario] = useState(() => { try { return loadStore()["session"] || null; } catch(e) { return null; } });
  const [tab, setTab] = useState("dash");
  const [as, setAs] = usePersistedState("asistencia", []);
  const [ac, setAc] = usePersistedState("actividades", []);
  const [pr, setPr] = usePersistedState("precios", []);
  const [inv, setInv] = usePersistedState("inventario", []);
  const [av, setAv] = usePersistedState("averias", []);

  const fechaHoy = () => new Date().toLocaleDateString("es-CO", {weekday:"long",day:"numeric",month:"long",year:"numeric"});

  const handleLogin = (user) => { saveStore("session", user); setUsuario(user); setTab("dash"); };
  const handleLogout = () => { saveStore("session", null); setUsuario(null); };
  const limpiar = () => {
    const hoy = HOY();
    if (!confirm("Limpiar registros de dias anteriores?")) return;
    setAs(p=>p.filter(r=>r.Fecha===hoy));
    setAc(p=>p.filter(r=>r.Fecha===hoy));
    setPr(p=>p.filter(r=>r.fecha===hoy));
    setInv(p=>p.filter(r=>r.Fecha===hoy));
    setAv(p=>p.filter(r=>r.Fecha===hoy));
  };

  if (!usuario) return <Login onLogin={handleLogin}/>;

  return (
    <div style={{minHeight:"100vh",background:"#F0F4FF",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      <div style={{maxWidth:"420px",margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
        <div style={{background:"linear-gradient(135deg,#0F2167,#1a3a8f)",padding:"8px 16px",position:"sticky",top:0,zIndex:200,boxShadow:"0 2px 12px rgba(15,33,103,0.4)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <img src="https://lobomarketer-byte.github.io/unimares-tracker/logo10.png" alt="Unimares" style={{height:"36px",objectFit:"contain",maxWidth:"140px"}}/>
            <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"2px"}}>
              <p style={{color:"#93C5FD",fontSize:"10px",margin:0,fontWeight:"600",textTransform:"capitalize",lineHeight:"1.3"}}>{fechaHoy()}</p>
              <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                <p style={{color:"#60A5FA",fontSize:"10px",margin:0,fontWeight:"600"}}>{usuario.nombre.split(" ")[0]}</p>
                <button onClick={handleLogout} style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:"6px",padding:"2px 7px",color:"rgba(255,255,255,0.7)",fontSize:"10px",cursor:"pointer",fontFamily:"inherit",fontWeight:"700"}}>Salir</button>
              </div>
            </div>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"16px 12px 100px"}}>
          {tab==="dash"  && <Dashboard as={as} ac={ac} pr={pr} inv={inv} av={av} limpiar={limpiar}/>}
          {tab==="asist" && <Asistencia data={as} setData={setAs}/>}
          {tab==="activ" && <Actividades data={ac} setData={setAc}/>}
          {tab==="prec"  && <Precios data={pr} setData={setPr}/>}
          {tab==="inv"   && <Inventario data={inv} setData={setInv}/>}
          {tab==="aver"  && <Averias data={av} setData={setAv}/>}
          {tab==="super" && <Supervisor/>}
        </div>
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(255,255,255,0.97)",backdropFilter:"blur(12px)",borderTop:"1px solid #E8EDF8",padding:"6px 2px",zIndex:100,boxShadow:"0 -4px 20px rgba(0,0,0,0.08)"}}>
          <div style={{display:"flex",justifyContent:"space-around",maxWidth:"420px",margin:"0 auto"}}>
            {TABS.filter(t => t.id !== "super" || usuario.rol === "supervisor").map(t => (
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"1px",padding:"5px 6px",borderRadius:"10px",border:"none",cursor:"pointer",background:tab===t.id?"#EEF2FF":"transparent",transition:"all 0.15s",fontFamily:"inherit",flexShrink:0}}>
                <span style={{fontSize:"18px",lineHeight:1}}>{t.i}</span>
                <span style={{fontSize:"9px",fontWeight:"700",color:tab===t.id?"#3B6FE8":"#94A3B8"}}>{t.l}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
